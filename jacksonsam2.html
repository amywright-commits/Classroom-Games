                    { text: "The roller rink plays music from the ___.", options: ["1980s", "1980's", "1980s'"], answer: "1980s" },
                    { text: "Make sure you read the ___ before asking a question.", options: ["FAQs", "FAQ's", "FAQs'"], answer: "FAQs" },
                    { text: "The club has a special entrance for ___.", options: ["VIPs", "VIP's", "VIPs'"], answer: "VIPs" },
                    { text: "She prefers the fashion trends of the ___.", options: ["90s", "90's", "90s'"], answer: "90s" },
                    { text: "There are too many ___ and not enough action.", options: ["IOUs", "IOU's", "IOUs'"], answer: "IOUs" },
                    { text: "The bank gave me the money in ___.", options: ["20s", "20's", "20s'"], answer: "20s" },
                    { text: "He scored three ___ on the dartboard.", options: ["100s", "100's", "100s'"], answer: "100s" },
                    { text: "The sky was filled with lights they thought were ___.", options: ["UFOs", "UFO's", "UFOs'"], answer: "UFOs" },
                    { text: "I need to get straight ___ to keep my scholarship.", options: ["As", "A's", "As'"], answer: "As" },
                    { text: "The temperature dropped into the ___ overnight.", options: ["30s", "30's", "30s'"], answer: "30s" },
                    { text: "They hired two new ___ to manage the finances.", options: ["CFOs", "CFO's", "CFOs'"], answer: "CFOs" }
                ]
            }
        ];

        // Add global click listener for the Multiple Choice Buttons
        document.addEventListener('click', (e) => {
            const btn = e.target.closest('.mc-btn');
            if (!btn) return;
            
            const container = btn.closest('.mc-group');
            // If section is already correctly answered and locked, don't allow changes
            if (container.classList.contains('locked')) return;

            // Deselect all others in this specific question group
            const siblings = container.querySelectorAll('.mc-btn');
            siblings.forEach(s => {
                s.classList.remove('bg-sky-100', 'border-sky-400', 'text-sky-800', 'selected', 'shadow-md', 'scale-105');
                s.classList.add('bg-white', 'border-slate-200', 'text-slate-600');
            });

            // Select the clicked one
            btn.classList.remove('bg-white', 'border-slate-200', 'text-slate-600');
            btn.classList.add('bg-sky-100', 'border-sky-400', 'text-sky-800', 'selected', 'shadow-md', 'scale-105');
        });

        // Initialize Application
        function initApp() {
            const container = document.getElementById('app-container');
            
            // 10 Unique Vibrant "Neon Box" Themes
            const themes = [
                { from: 'from-pink-500', to: 'to-rose-500' },
                { from: 'from-violet-500', to: 'to-purple-600' },
                { from: 'from-blue-500', to: 'to-cyan-500' },
                { from: 'from-emerald-500', to: 'to-teal-500' },
                { from: 'from-amber-500', to: 'to-orange-500' },
                { from: 'from-red-500', to: 'to-rose-600' },
                { from: 'from-indigo-500', to: 'to-blue-600' },
                { from: 'from-fuchsia-500', to: 'to-pink-600' },
                { from: 'from-cyan-500', to: 'to-teal-400' },
                { from: 'from-purple-600', to: 'to-violet-500' }
            ];
            
            rulesData.forEach((rule, ruleIdx) => {
                const theme = themes[ruleIdx % themes.length];

                const section = document.createElement('section');
                section.className = 'bg-white rounded-2xl mb-12 border border-slate-200 relative overflow-hidden shadow-lg';
                
                // 1. Create the Big Colored Banner
                const banner = document.createElement('div');
                banner.className = `bg-gradient-to-r ${theme.from} ${theme.to} p-6 md:p-8 relative overflow-hidden shadow-md`;
                banner.innerHTML = `
                    <div class="absolute -top-24 -right-24 w-64 h-64 bg-white/20 rounded-full blur-3xl"></div>
                    <div class="relative z-10">
                        <div class="inline-block bg-white/20 backdrop-blur-md text-white font-black px-4 py-1.5 rounded-md text-sm mb-3 tracking-widest uppercase border border-white/40 shadow-sm">
                            Rule ${rule.ruleNumber}
                        </div>
                        <h2 class="text-3xl md:text-4xl font-extrabold text-white mb-3 drop-shadow-lg tracking-tight" style="text-shadow: 0 0 15px rgba(255,255,255,0.5), 0 0 30px rgba(255,255,255,0.3);">${rule.title}</h2>
                        <p class="text-white/95 text-lg font-medium drop-shadow-sm max-w-3xl">${rule.description}</p>
                    </div>
                `;
                section.appendChild(banner);

                // 2. Create the Body Wrapper for Content
                const bodyDiv = document.createElement('div');
                bodyDiv.className = 'p-6 md:p-8';

                // 3. Examples Box
                bodyDiv.innerHTML = `
                    <div class="bg-slate-50 border border-slate-200 rounded-xl p-5 mb-8 shadow-inner">
                        <span class="text-xs text-slate-500 uppercase tracking-widest font-bold mb-3 block">Examples:</span>
                        <ul class="list-disc list-inside text-slate-700 font-medium space-y-1.5">
                            ${rule.examples.map(ex => `<li>${ex}</li>`).join('')}
                        </ul>
                    </div>
                `;

                // Questions Container
                const questionsDiv = document.createElement('div');
                questionsDiv.className = 'space-y-4 mb-8 relative z-10';

                rule.questions.forEach((q, qIdx) => {
                    const qId = `q_${ruleIdx}_${qIdx}`;
                    
                    const qRow = document.createElement('div');
                    qRow.className = 'bg-slate-50 p-4 rounded-xl border border-slate-200 hover:bg-slate-100 transition-colors shadow-sm';
                    
                    let rowContent = `<div class="flex items-start w-full">`;
                    rowContent += `<span class="text-slate-500 font-mono text-base w-8 pt-0.5 text-right mr-3 flex-shrink-0">${qIdx + 1}.</span>`;
                    
                    rowContent += `<div class="flex-grow flex flex-col gap-3">`;
                    rowContent += `<span class="text-slate-700 text-lg font-medium leading-relaxed">${q.text}</span>`;
                    
                    // Render the Shuffled Options Buttons
                    rowContent += `<div class="mc-group flex flex-wrap gap-3" id="${qId}_options">`;
                    const shuffledOptions = shuffleArray(q.options);
                    shuffledOptions.forEach(opt => {
                        rowContent += `<button type="button" class="mc-btn px-4 py-2 bg-white border-2 border-slate-200 rounded-lg text-slate-600 font-bold hover:bg-slate-100 transition-all text-base shadow-sm focus:outline-none" data-val="${opt.replace(/"/g, '&quot;')}">${opt}</button>`;
                    });
                    rowContent += `</div>`;
                    rowContent += `</div>`;
                    
                    // Feedback container
                    rowContent += `<div class="flex items-center ml-4 flex-shrink-0 w-24 justify-end">`;
                    rowContent += `<span id="feedback_${qId}" class="font-bold text-sm hidden whitespace-nowrap uppercase tracking-wider"></span>`;
                    rowContent += `</div>`;
                    
                    rowContent += `</div>`;
                    
                    qRow.innerHTML = rowContent;
                    questionsDiv.appendChild(qRow);
                });

                bodyDiv.appendChild(questionsDiv);

                // Check Button
                const btnContainer = document.createElement('div');
                btnContainer.className = 'flex justify-end relative z-10';
                const checkBtn = document.createElement('button');
                checkBtn.className = 'btn-check text-white font-bold py-3 px-8 rounded-xl tracking-wider uppercase';
                checkBtn.innerText = 'Check Answers';
                checkBtn.onclick = () => checkSection(ruleIdx, checkBtn);
                
                btnContainer.appendChild(checkBtn);
                bodyDiv.appendChild(btnContainer);
                section.appendChild(bodyDiv);
                
                container.appendChild(section);
            });
        }

        function checkSection(ruleIdx, btnElement) {
            const rule = rulesData[ruleIdx];
            
            rule.questions.forEach((q, qIdx) => {
                const qId = `q_${ruleIdx}_${qIdx}`;
                const container = document.getElementById(`${qId}_options`);
                const feedback = document.getElementById(`feedback_${qId}`);
                const selectedBtn = container.querySelector('.selected');
                
                // Reset feedback visually
                feedback.classList.remove('hidden', 'neon-green-text', 'text-red-500');
                
                // Reset styling of buttons ONLY IF the container isn't already locked (correct)
                if (!container.classList.contains('locked')) {
                    const allBtns = container.querySelectorAll('.mc-btn');
                    allBtns.forEach(btn => {
                        btn.classList.remove('bg-red-100', 'border-red-400', 'text-red-800', 'bg-green-100', 'border-green-500', 'text-green-800');
                    });
                } else {
                    return; // Skip evaluation if this question was already answered correctly
                }

                if (!selectedBtn) {
                    feedback.innerText = "Missed";
                    feedback.classList.add('text-red-500');
                    return;
                }

                const userAnswer = selectedBtn.dataset.val;
                const correctAnswer = q.answer;

                // Check answer
                if (userAnswer === correctAnswer || (q.alternate && userAnswer === q.alternate)) {
                    selectedBtn.classList.remove('bg-sky-100', 'border-sky-400', 'text-sky-800');
                    selectedBtn.classList.add('bg-green-100', 'border-green-500', 'text-green-800');
                    feedback.innerText = "Correct";
                    feedback.classList.add('neon-green-text');
                    container.classList.add('locked'); // Lock this question
                    
                    // Dim the unselected, correct buttons so the right answer stands out
                    const allBtns = container.querySelectorAll('.mc-btn');
                    allBtns.forEach(b => {
                        b.disabled = true;
                        b.classList.add('cursor-not-allowed');
                        if (!b.classList.contains('selected')) {
                            b.classList.add('opacity-50');
                        }
                    });

                    // Update Score
                    if (!container.dataset.scored) {
                        totalScore += 1;
                        container.dataset.scored = "true";
                    }
                } else {
                    // Answer is wrong
                    selectedBtn.classList.remove('bg-sky-100', 'border-sky-400', 'text-sky-800');
                    selectedBtn.classList.add('bg-red-100', 'border-red-400', 'text-red-800');
                    feedback.innerText = `Try Again`;
                    feedback.classList.add('text-red-500');
                }
            });

            // Update Total Score Display
            document.getElementById('total-score').innerText = totalScore;
            
            // Add a little pop animation to the score
            const scoreEl = document.getElementById('total-score');
            scoreEl.style.transform = 'scale(1.3)';
            setTimeout(() => {
                scoreEl.style.transform = 'scale(1)';
            }, 200);

            // Change button state if all in this section are correct
            const allContainers = document.querySelectorAll(`[id^="q_${ruleIdx}_"]`);
            const allCorrect = Array.from(allContainers).every(c => c.classList.contains('locked'));
            
            if (allCorrect) {
                btnElement.innerText = "Section Passed!";
                btnElement.disabled = true;
                btnElement.classList.replace('btn-check', 'bg-green-600');
            } else {
                btnElement.innerText = "Try Again";
            }
        }

        // Run setup on load
        window.onload = initApp;
    </script>
</body>
</html>
