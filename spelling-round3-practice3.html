<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>5th Grade Spelling - Spot the Imposter</title>
    <style>
        :root {
            --primary: #2C3E50;
            --primary-light: #34495E;
            --accent: #E67E22;
            --accent-hover: #D35400;
            --success: #27AE60;
            --danger: #C0392B;
            --background: #ECF0F1;
            --card-bg: #FFFFFF;
            --text-main: #2C3E50;
            --text-light: #7F8C8D;
        }

        body {
            font-family: 'Trebuchet MS', 'Lucida Sans Unicode', 'Lucida Grande', 'Lucida Sans', Arial, sans-serif;
            background-color: var(--background);
            color: var(--text-main);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
            box-sizing: border-box;
            background-image: radial-gradient(circle at center, #ECF0F1 0%, #BDC3C7 100%);
        }

        .game-container {
            background-color: var(--card-bg);
            border-radius: 15px;
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.2);
            width: 100%;
            max-width: 650px;
            padding: 40px 30px;
            text-align: center;
            position: relative;
            border-top: 8px solid var(--primary);
        }

        h1 {
            color: var(--primary);
            margin-top: 0;
            font-size: 2.4em;
            letter-spacing: 1px;
        }

        .detective-icon {
            font-size: 3em;
            margin-bottom: 10px;
        }

        /* Progress Bar */
        .progress-container {
            width: 100%;
            background-color: #E0E0E0;
            border-radius: 10px;
            height: 15px;
            margin-bottom: 30px;
            overflow: hidden;
        }

        .progress-bar {
            height: 100%;
            background-color: var(--accent);
            width: 0%;
            transition: width 0.5s ease-in-out;
            border-radius: 10px;
        }

        .instruction {
            font-size: 1.2em;
            color: var(--primary-light);
            margin-bottom: 30px;
            font-weight: bold;
        }

        /* Options Grid */
        .options-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 20px;
            margin-bottom: 25px;
        }

        .option-btn {
            background-color: #F8F9F9;
            border: 3px solid #D5D8DC;
            border-radius: 12px;
            padding: 20px 10px;
            font-size: 1.5em;
            font-family: inherit;
            color: var(--text-main);
            cursor: pointer;
            transition: all 0.2s ease;
            box-shadow: 0 4px 6px rgba(0,0,0,0.05);
        }

        .option-btn:hover:not(:disabled) {
            border-color: var(--primary);
            background-color: #EBF5FB;
            transform: translateY(-2px);
            box-shadow: 0 6px 12px rgba(0,0,0,0.1);
        }

        .option-btn:active:not(:disabled) {
            transform: translateY(1px);
        }

        .option-btn.correct {
            background-color: #D5F5E3;
            border-color: var(--success);
            color: var(--success);
            font-weight: bold;
        }

        .option-btn.wrong {
            background-color: #FADBD8;
            border-color: var(--danger);
            color: var(--danger);
            opacity: 0.6;
            cursor: not-allowed;
            transform: none;
        }

        /* Hint Section */
        .btn-hint {
            background-color: var(--primary);
            color: white;
            padding: 12px 25px;
            font-size: 1.1em;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-weight: bold;
            transition: background-color 0.2s;
            margin-top: 10px;
        }

        .btn-hint:hover { background-color: var(--primary-light); }

        .hint-text {
            margin-top: 20px;
            font-size: 1.1em;
            color: var(--primary);
            background-color: #FFF3E0;
            padding: 15px;
            border-radius: 8px;
            border: 2px dashed var(--accent);
            display: none;
            text-align: left;
        }

        /* Feedback */
        .feedback {
            margin-top: 20px;
            font-size: 1.4em;
            font-weight: bold;
            min-height: 35px;
        }

        @keyframes popIn {
            0% { transform: scale(0.8); opacity: 0; }
            100% { transform: scale(1); opacity: 1; }
        }

        .pop-animation {
            animation: popIn 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards;
        }

        /* End Screen */
        #end-screen { display: none; }
        
        .score-circle {
            width: 150px;
            height: 150px;
            background-color: var(--accent);
            color: white;
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 3em;
            font-weight: bold;
            margin: 20px auto;
            border: 8px solid #FAD7A1;
        }

        .btn-restart {
            background-color: var(--success);
            color: white;
            padding: 15px 30px;
            font-size: 1.2em;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-weight: bold;
            margin-top: 20px;
        }
        .btn-restart:hover { background-color: #219A52; }

        @media (max-width: 500px) {
            .options-grid { grid-template-columns: 1fr; gap: 15px; }
            .option-btn { padding: 15px 10px; font-size: 1.3em; }
        }
    </style>
</head>
<body>

    <div class="game-container">
        <!-- Progress Bar -->
        <div class="progress-container" id="progress-container">
            <div class="progress-bar" id="progress-bar"></div>
        </div>

        <!-- Main Game Area -->
        <div id="game-screen">
            <div class="detective-icon">🕵️‍♂️🔍</div>
            <h1>Spot the Imposter!</h1>
            <p class="instruction">Three of these words are fakes. Click on the <strong>correctly spelled</strong> word.</p>
            
            <div class="options-grid" id="options-grid">
                <!-- Buttons injected by JS -->
            </div>
            
            <button class="btn-hint" id="hint-btn" onclick="showHint()">I need a clue 💡</button>

            <div class="hint-text" id="hint-text"></div>
            <div class="feedback" id="feedback-msg"></div>
        </div>

        <!-- End Screen -->
        <div id="end-screen">
            <div class="detective-icon">🏆🎖️</div>
            <h1>Case Closed!</h1>
            <p class="instruction" id="final-message">You found all the correctly spelled words.</p>
            <div class="score-circle" id="score-display">16/16</div>
            <button class="btn-restart" onclick="initGame()">Play Again</button>
        </div>
    </div>

    <script>
        // The Spelling List with carefully crafted common misspellings (imposters)
        const wordList = [
            { correct: "laugh", imposters: ["laff", "lagh", "lough"], hint: "You do this when someone tells a funny joke. (Hint: Think of 'a' and 'u' doing it together!)" },
            { correct: "embarrass", imposters: ["embarass", "embarras", "imbarrass"], hint: "To make someone's face turn red because they feel awkward. (Hint: Double trouble! Two R's and two S's.)" },
            { correct: "separate", imposters: ["seperate", "sepperate", "separete"], hint: "To pull things apart so they aren't together anymore. (Hint: There is a 'rat' in the middle.)" },
            { correct: "decide", imposters: ["deside", "dicide", "decied"], hint: "When you have to pick between two things, you must do this. (Hint: Ends with the sound 'ide'.)" },
            { correct: "ignore", imposters: ["ignour", "ignoar", "iggnore"], hint: "When you pretend you don't hear someone talking to you. (Hint: Ends with the word 'ore'.)" },
            { correct: "believe", imposters: ["beleive", "beleeve", "bilieve"], hint: "To think that something is absolutely true. (Hint: Remember the rule: 'i' before 'e'!)" },
            { correct: "bought", imposters: ["bawt", "bout", "boght"], hint: "The past tense of 'buy'. I ____ a candy bar yesterday. (Hint: Uses the tricky 'ough' ending.)" },
            { correct: "thought", imposters: ["thawt", "thout", "thoght"], hint: "An idea that pops into your head. (Hint: Uses the tricky 'ough' ending.)" },
            { correct: "favorite", imposters: ["favrite", "faverite", "favourit"], hint: "The one you like the very most out of all the options. (Hint: Ends with 'ite' (i-t-e).)" },
            { correct: "different", imposters: ["diffrent", "diferent", "diffarent"], hint: "The opposite of 'the same'. (Hint: Don't forget the double 'f' and the 'er' in the middle!)" },
            { correct: "beautiful", imposters: ["beutiful", "beeyutiful", "beautyful"], hint: "Something that is very, very pretty to look at. (Hint: Remember the vowel pattern: e-a-u.)" },
            { correct: "interesting", imposters: ["intresting", "intersting", "inneresting"], hint: "Something that holds your attention because it's cool to learn about. (Hint: Don't skip the 'er' in the middle: int-er-esting.)" },
            { correct: "terrible", imposters: ["terible", "terrable", "tareible"], hint: "Something that is extremely bad or awful. (Hint: Has a double 'r' in the middle.)" },
            { correct: "excited", imposters: ["exsited", "excitted", "ecxited"], hint: "How you feel right before going to an amusement park! (Hint: Starts with 'ex' and hides a 'c' before the 'i'.)" },
            { correct: "weird", imposters: ["wierd", "weard", "weerd"], hint: "Something very strange or unusual. (Hint: Rule breaker! It's 'e' before 'i' for this word.)" },
            { correct: "quiet", imposters: ["quite", "qweit", "quiete"], hint: "Shhh... making zero noise. (Hint: Ends with 'iet' (i-e-t).)" }
        ];

        let currentWords = [];
        let currentIndex = 0;
        let score = 0;
        let firstTry = true; // Tracks if they got it right on the very first click

        const optionsGrid = document.getElementById('options-grid');
        const hintText = document.getElementById('hint-text');
        const feedbackMsg = document.getElementById('feedback-msg');
        const progressBar = document.getElementById('progress-bar');
        const gameScreen = document.getElementById('game-screen');
        const endScreen = document.getElementById('end-screen');

        // Shuffle utility
        function shuffle(array) {
            let currentIndex = array.length, randomIndex;
            while (currentIndex != 0) {
                randomIndex = Math.floor(Math.random() * currentIndex);
                currentIndex--;
                [array[currentIndex], array[randomIndex]] = [array[randomIndex], array[currentIndex]];
            }
            return array;
        }

        function initGame() {
            currentWords = shuffle([...wordList]);
            currentIndex = 0;
            score = 0;
            
            gameScreen.style.display = 'block';
            endScreen.style.display = 'none';
            document.getElementById('progress-container').style.display = 'block';
            
            updateProgress();
            loadWord();
        }

        function loadWord() {
            const currentObj = currentWords[currentIndex];
            firstTry = true; // reset attempt tracker
            
            hintText.style.display = 'none';
            hintText.textContent = currentObj.hint;
            feedbackMsg.textContent = '';
            optionsGrid.innerHTML = '';
            optionsGrid.classList.remove('pop-animation');
            void optionsGrid.offsetWidth; // trigger reflow for animation
            optionsGrid.classList.add('pop-animation');

            // Combine correct word with imposters and shuffle them
            let options = [currentObj.correct, ...currentObj.imposters];
            options = shuffle(options);

            // Create buttons
            options.forEach(option => {
                const btn = document.createElement('button');
                btn.className = 'option-btn';
                btn.textContent = option;
                btn.onclick = () => checkAnswer(btn, option, currentObj.correct);
                optionsGrid.appendChild(btn);
            });
        }

        function updateProgress() {
            const percentage = (currentIndex / currentWords.length) * 100;
            progressBar.style.width = percentage + '%';
        }

        function checkAnswer(btn, selectedWord, correctWord) {
            // Disable button so it can't be clicked twice
            btn.disabled = true;

            if (selectedWord === correctWord) {
                // Correct
                btn.classList.add('correct');
                feedbackMsg.textContent = "Correct! 🌟";
                feedbackMsg.style.color = "var(--success)";
                
                if (firstTry) score++; // Only give a point if they found it on the first click
                
                // Disable all other buttons
                const allBtns = document.querySelectorAll('.option-btn');
                allBtns.forEach(b => b.disabled = true);

                setTimeout(() => {
                    currentIndex++;
                    if (currentIndex < currentWords.length) {
                        updateProgress();
                        loadWord();
                    } else {
                        endGame();
                    }
                }, 1200);

            } else {
                // Incorrect
                firstTry = false; // They missed the first try
                btn.classList.add('wrong');
                feedbackMsg.textContent = "That's an imposter! Try again. ❌";
                feedbackMsg.style.color = "var(--danger)";
            }
        }

        function showHint() {
            hintText.style.display = 'block';
            firstTry = false; // Using a hint costs the "first try" point for that word
        }

        function endGame() {
            progressBar.style.width = '100%';
            setTimeout(() => {
                gameScreen.style.display = 'none';
                document.getElementById('progress-container').style.display = 'none';
                endScreen.style.display = 'block';
                
                document.getElementById('score-display').textContent = `${score}/${currentWords.length}`;
                
                const finalMsg = document.getElementById('final-message');
                if (score === currentWords.length) {
                    finalMsg.innerHTML = "Perfect! You have an amazing eye for spelling. 🦅";
                } else if (score >= currentWords.length * 0.7) {
                    finalMsg.innerHTML = "Great job! You caught most of the imposters. 🕵️‍♂️";
                } else {
                    finalMsg.innerHTML = "Good practice! Keep training your detective eyes. 👀";
                }
            }, 600);
        }

        // Start game on load
        window.onload = initGame;
    </script>
</body>
</html>
