<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Crazy Tales: 5 Story Mad Libs</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Chewy&family=Nunito:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Nunito', sans-serif;
            background-color: #e0e7ff; /* Indigo 50 */
            background-image: radial-gradient(#a5b4fc 1px, transparent 1px);
            background-size: 25px 25px;
            min-height: 100vh;
        }

        h1, h2, h3, .chewy-font {
            font-family: 'Chewy', cursive;
        }

        .hidden-screen {
            display: none !important;
        }

        /* Generated Word Styling */
        .mad-lib-word {
            color: #ec4899; /* Pink 500 */
            font-weight: 900;
            text-decoration: underline;
            text-decoration-style: wavy;
            text-decoration-color: #fbcfe8;
            font-size: 110%;
            padding: 0 4px;
            transition: transform 0.2s;
            display: inline-block;
        }

        .mad-lib-word:hover {
            transform: scale(1.1) rotate(-2deg);
        }

        /* Animations */
        .fade-in { animation: fadeIn 0.4s ease-out forwards; }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(15px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .slide-in { animation: slideIn 0.3s ease-out forwards; }
        @keyframes slideIn {
            from { opacity: 0; transform: translateX(-20px); }
            to { opacity: 1; transform: translateX(0); }
        }

        /* Custom Input Styling */
        .story-input {
            border: 3px solid #cbd5e1;
            border-bottom-width: 6px;
            transition: all 0.2s;
        }
        .story-input:focus {
            outline: none;
            border-color: #818cf8;
            border-bottom-color: #4f46e5;
            transform: translateY(2px);
            border-bottom-width: 4px;
        }
    </style>
</head>
<body class="p-4 flex items-center justify-center">

    <div class="bg-white shadow-2xl rounded-3xl p-6 md:p-10 w-full max-w-5xl border-4 border-indigo-400">
        
        <!-- ==================== HEADER ==================== -->
        <div class="text-center mb-8 border-b-4 border-dashed border-indigo-100 pb-6">
            <h1 class="text-6xl text-indigo-600 mb-2 tracking-wide">🤪 Crazy Tales</h1>
            <p class="text-xl text-gray-500 font-bold">Pick a story, fill in the blanks, and laugh!</p>
        </div>

        <!-- ==================== SCREEN 1: STORY SELECTION ==================== -->
        <div id="selection-screen" class="fade-in space-y-6">
            <h2 class="text-3xl text-center text-gray-700 chewy-font mb-6">Which adventure do you want to play?</h2>
            
            <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-6">
                <!-- Story 1 Card -->
                <button onclick="selectStory(0)" class="bg-blue-50 hover:bg-blue-100 border-4 border-blue-300 rounded-2xl p-6 text-center transition-transform hover:scale-105 active:scale-95 group">
                    <div class="text-6xl mb-4 group-hover:animate-bounce">🦸‍♂️</div>
                    <h3 class="text-2xl text-blue-600 chewy-font">Superhero Secret</h3>
                    <p class="text-gray-600 font-bold mt-2 text-sm">Discover your hilarious new superpowers!</p>
                </button>

                <!-- Story 2 Card -->
                <button onclick="selectStory(1)" class="bg-purple-50 hover:bg-purple-100 border-4 border-purple-300 rounded-2xl p-6 text-center transition-transform hover:scale-105 active:scale-95 group">
                    <div class="text-6xl mb-4 group-hover:animate-bounce">🪄</div>
                    <h3 class="text-2xl text-purple-600 chewy-font">Magic Mishap</h3>
                    <p class="text-gray-600 font-bold mt-2 text-sm">A potions class goes completely wrong.</p>
                </button>

                <!-- Story 3 Card -->
                <button onclick="selectStory(2)" class="bg-green-50 hover:bg-green-100 border-4 border-green-300 rounded-2xl p-6 text-center transition-transform hover:scale-105 active:scale-95 group">
                    <div class="text-6xl mb-4 group-hover:animate-bounce">🦖</div>
                    <h3 class="text-2xl text-green-600 chewy-font">My Pet T-Rex</h3>
                    <p class="text-gray-600 font-bold mt-2 text-sm">What happens when you bring home a dino?</p>
                </button>

                <!-- Story 4 Card -->
                <button onclick="selectStory(3)" class="bg-yellow-50 hover:bg-yellow-100 border-4 border-yellow-300 rounded-2xl p-6 text-center transition-transform hover:scale-105 active:scale-95 group">
                    <div class="text-6xl mb-4 group-hover:animate-bounce">🏴‍☠️</div>
                    <h3 class="text-2xl text-yellow-600 chewy-font">Pirate's Booty</h3>
                    <p class="text-gray-600 font-bold mt-2 text-sm">Hunt for the wackiest hidden treasure.</p>
                </button>

                <!-- Story 5 Card -->
                <button onclick="selectStory(4)" class="bg-cyan-50 hover:bg-cyan-100 border-4 border-cyan-300 rounded-2xl p-6 text-center transition-transform hover:scale-105 active:scale-95 group">
                    <div class="text-6xl mb-4 group-hover:animate-bounce">🤖</div>
                    <h3 class="text-2xl text-cyan-600 chewy-font">Robot Friend</h3>
                    <p class="text-gray-600 font-bold mt-2 text-sm">Build the silliest mechanical buddy ever.</p>
                </button>
            </div>
        </div>

        <!-- ==================== SCREEN 2: INPUT FORM ==================== -->
        <div id="input-screen" class="hidden-screen fade-in">
            <div class="flex justify-between items-center mb-6">
                <h2 id="current-story-title" class="text-3xl text-indigo-600 chewy-font">Story Title</h2>
                <button onclick="resetGame()" class="text-gray-400 hover:text-red-500 font-bold transition-colors">
                    🔙 Go Back
                </button>
            </div>

            <div class="bg-indigo-50 p-6 rounded-2xl border-2 border-indigo-100 mb-8">
                <p class="text-lg text-indigo-800 font-bold mb-4">Fill in the blanks with the correct types of words to build your story!</p>
                
                <form id="word-form" class="space-y-4">
                    <!-- Input fields will be injected here by JavaScript -->
                </form>
            </div>

            <div class="text-center">
                <button onclick="generateStory(event)" class="bg-indigo-500 hover:bg-indigo-600 text-white text-3xl chewy-font py-4 px-12 rounded-full shadow-lg transition-transform hover:scale-105 active:scale-95 border-b-4 border-indigo-700 w-full md:w-auto">
                    Read My Story! 📖
                </button>
                <p id="error-msg" class="text-red-500 font-bold mt-4 opacity-0 transition-opacity">Please fill in all the blanks!</p>
            </div>
        </div>

        <!-- ==================== SCREEN 3: RESULT ==================== -->
        <div id="result-screen" class="hidden-screen fade-in text-center">
            <div class="bg-yellow-50 border-4 border-yellow-300 rounded-3xl p-8 mb-8 text-left shadow-inner relative overflow-hidden">
                <div class="absolute top-0 right-0 opacity-10 text-9xl -mt-6 -mr-4 pointer-events-none">⭐</div>
                
                <h2 id="result-title" class="text-4xl text-yellow-700 chewy-font mb-6 text-center border-b-2 border-yellow-200 pb-4">Story Title</h2>
                
                <p id="result-text" class="text-2xl text-gray-800 leading-relaxed font-bold">
                    <!-- The generated story goes here -->
                </p>
            </div>

            <button onclick="resetGame()" class="bg-pink-500 hover:bg-pink-600 text-white text-3xl chewy-font py-4 px-12 rounded-full shadow-lg transition-transform hover:scale-105 active:scale-95 border-b-4 border-pink-700">
                Play Another Story! 🔄
            </button>
        </div>

    </div>

    <!-- JavaScript Game Logic -->
    <script>
        // Data: 5 Different Stories with unique prompts and templates
        const stories = [
            {
                id: 0,
                title: "🦸‍♂️ Superhero Secret",
                themeColor: "blue",
                prompts: [
                    { id: "word0", label: "Adjective (describing word)" },
                    { id: "word1", label: "Animal" },
                    { id: "word2", label: "Body Part" },
                    { id: "word3", label: "Verb (action word)" },
                    { id: "word4", label: "Plural Noun (more than one thing)" },
                    { id: "word5", label: "Silly Made-Up Word" }
                ],
                template: (words) => `One day, I was walking down the street when I was bitten by a <span class="mad-lib-word">${words[0]}</span> <span class="mad-lib-word">${words[1]}</span>. Suddenly, my <span class="mad-lib-word">${words[2]}</span> started glowing! I realized I had the amazing power to <span class="mad-lib-word">${words[3]}</span> over tall buildings. I needed a super costume, so I made one entirely out of <span class="mad-lib-word">${words[4]}</span>. Now the whole city depends on me, and they call me Captain <span class="mad-lib-word">${words[5]}</span>!`
            },
            {
                id: 1,
                title: "🪄 Magic Mishap",
                themeColor: "purple",
                prompts: [
                    { id: "word0", label: "Adjective" },
                    { id: "word1", label: "Type of Liquid" },
                    { id: "word2", label: "Noun (a thing)" },
                    { id: "word3", label: "Verb ending in -ing" },
                    { id: "word4", label: "Emotion" },
                    { id: "word5", label: "Plural Noun" }
                ],
                template: (words) => `In our <span class="mad-lib-word">${words[0]}</span> potions class today, we had to mix crushed dragon scales with a big cup of <span class="mad-lib-word">${words[1]}</span>. But I accidentally dropped my <span class="mad-lib-word">${words[2]}</span> right into the cauldron! The potion immediately started <span class="mad-lib-word">${words[3]}</span> violently. Our wizard teacher felt absolute <span class="mad-lib-word">${words[4]}</span> when the cauldron exploded, magically turning everyone's hair into <span class="mad-lib-word">${words[5]}</span>!`
            },
            {
                id: 2,
                title: "🦖 My Pet T-Rex",
                themeColor: "green",
                prompts: [
                    { id: "word0", label: "Adjective" },
                    { id: "word1", label: "Type of Food" },
                    { id: "word2", label: "Verb (past tense)" },
                    { id: "word3", label: "Room in a House" },
                    { id: "word4", label: "Plural Noun" },
                    { id: "word5", label: "Silly Adjective" }
                ],
                template: (words) => `Yesterday, I found a very <span class="mad-lib-word">${words[0]}</span> dinosaur egg buried in the backyard sandpit. When it finally hatched, it was so hungry that I fed it a plate of <span class="mad-lib-word">${words[1]}</span>. It grew so incredibly fast that it accidentally <span class="mad-lib-word">${words[2]}</span> the fence! Now, it sleeps comfortably in the <span class="mad-lib-word">${words[3]}</span> and loves playing with my <span class="mad-lib-word">${words[4]}</span>. Having a pet dinosaur is definitely <span class="mad-lib-word">${words[5]}</span>.`
            },
            {
                id: 3,
                title: "🏴‍☠️ Pirate's Booty",
                themeColor: "yellow",
                prompts: [
                    { id: "word0", label: "Adjective" },
                    { id: "word1", label: "Noun (a thing)" },
                    { id: "word2", label: "Verb (action word)" },
                    { id: "word3", label: "Plural Noun" },
                    { id: "word4", label: "Color" },
                    { id: "word5", label: "Animal" }
                ],
                template: (words) => `The infamous Captain Blackbeard hid his most <span class="mad-lib-word">${words[0]}</span> treasure inside a secret <span class="mad-lib-word">${words[1]}</span>. To find it, you first have to <span class="mad-lib-word">${words[2]}</span> past the quicksand swamp and fight off a wild pack of <span class="mad-lib-word">${words[3]}</span>. Finally, X marks the spot! But be careful, the treasure is guarded by a giant <span class="mad-lib-word">${words[4]}</span> <span class="mad-lib-word">${words[5]}</span>!`
            },
            {
                id: 4,
                title: "🤖 Robot Friend",
                themeColor: "cyan",
                prompts: [
                    { id: "word0", label: "Adjective" },
                    { id: "word1", label: "Noun (a thing)" },
                    { id: "word2", label: "Verb (action word)" },
                    { id: "word3", label: "Plural Noun" },
                    { id: "word4", label: "Type of Liquid" },
                    { id: "word5", label: "Silly Name" }
                ],
                template: (words) => `I just built a <span class="mad-lib-word">${words[0]}</span> robot using nothing but an old cardboard box and a rusty <span class="mad-lib-word">${words[1]}</span>. It is fully programmed to <span class="mad-lib-word">${words[2]}</span> all my homework and even clean up the <span class="mad-lib-word">${words[3]}</span> in my room. It doesn't run on electricity; its fuel is actually <span class="mad-lib-word">${words[4]}</span>! It walks up to people and says, "Beep boop! Hello, I am <span class="mad-lib-word">${words[5]}</span>!"`
            }
        ];

        // State Variables
        let currentStoryIndex = null;

        // DOM Elements
        const selectionScreen = document.getElementById('selection-screen');
        const inputScreen = document.getElementById('input-screen');
        const resultScreen = document.getElementById('result-screen');
        const wordForm = document.getElementById('word-form');
        const currentStoryTitle = document.getElementById('current-story-title');
        const errorMsg = document.getElementById('error-msg');
        const resultTitle = document.getElementById('result-title');
        const resultText = document.getElementById('result-text');

        function selectStory(index) {
            currentStoryIndex = index;
            const story = stories[index];
            
            // Setup title
            currentStoryTitle.innerText = story.title;
            
            // Clear old form
            wordForm.innerHTML = '';
            errorMsg.style.opacity = '0';

            // Generate Input Fields with staggered animation
            story.prompts.forEach((prompt, i) => {
                const inputGroup = document.createElement('div');
                inputGroup.className = 'flex flex-col md:flex-row md:items-center gap-2 slide-in opacity-0';
                inputGroup.style.animationDelay = `${i * 0.1}s`; // Stagger the animation

                inputGroup.innerHTML = `
                    <label for="${prompt.id}" class="md:w-1/3 text-lg font-bold text-gray-700 chewy-font tracking-wide">${prompt.label}:</label>
                    <input type="text" id="${prompt.id}" class="story-input md:w-2/3 p-3 rounded-xl bg-white text-xl font-bold text-indigo-900 placeholder-gray-300" placeholder="Type word here..." autocomplete="off">
                `;
                wordForm.appendChild(inputGroup);
            });

            // Switch screens
            selectionScreen.classList.add('hidden-screen');
            inputScreen.classList.remove('hidden-screen');
            
            // Focus first input automatically
            setTimeout(() => {
                document.getElementById('word0').focus();
            }, 100);
        }

        function generateStory(e) {
            e.preventDefault(); // Prevent form submission if accidentally triggered
            
            const story = stories[currentStoryIndex];
            const collectedWords = [];
            let allFilled = true;

            // Collect inputs and check if empty
            for (let i = 0; i < story.prompts.length; i++) {
                const inputEl = document.getElementById(`word${i}`);
                const word = inputEl.value.trim();
                
                if (word === "") {
                    allFilled = false;
                    inputEl.classList.add('border-red-500'); // Highlight empty field
                } else {
                    inputEl.classList.remove('border-red-500');
                    collectedWords.push(word.toUpperCase()); // Capitalize for effect
                }
            }

            if (!allFilled) {
                errorMsg.style.opacity = '1';
                // Shake the button a little bit to show error
                errorMsg.classList.add('animate-bounce');
                setTimeout(() => errorMsg.classList.remove('animate-bounce'), 1000);
                return;
            }

            // If we have all words, generate!
            errorMsg.style.opacity = '0';
            
            // Build the final text
            resultTitle.innerText = story.title;
            resultText.innerHTML = story.template(collectedWords);

            // Switch screens
            inputScreen.classList.add('hidden-screen');
            resultScreen.classList.remove('hidden-screen');
        }

        function resetGame() {
            // Hide everything else and show selection screen
            inputScreen.classList.add('hidden-screen');
            resultScreen.classList.add('hidden-screen');
            selectionScreen.classList.remove('hidden-screen');
            
            currentStoryIndex = null;
        }
    </script>
</body>
</html>
