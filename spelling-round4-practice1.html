<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Interactive Spelling Practice</title>
    <style>
        /* Encapsulating styles for Canvas LMS */
        .spelling-activity-wrapper {
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background-color: #f4f7fb;
            padding: 20px;
            border-radius: 12px;
            box-sizing: border-box;
            color: #2c3e50;
            user-select: none; /* Prevent text selection while dragging */
        }

        .spelling-container {
            max-width: 700px;
            margin: 0 auto;
            background: #ffffff;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 8px 25px rgba(0, 0, 0, 0.08);
            border-top: 6px solid #4a90e2;
            text-align: center;
        }

        .progress-indicator {
            font-size: 0.9em;
            color: #7f8c8d;
            margin-bottom: 15px;
            font-weight: bold;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .sentence-display {
            font-size: 1.3em;
            line-height: 1.6;
            margin-bottom: 30px;
            color: #34495e;
            padding: 10px 20px;
        }

        .drop-zone-container {
            display: inline-flex;
            gap: 8px;
            margin: 0 10px;
            vertical-align: middle;
            flex-wrap: wrap;
            justify-content: center;
        }

        .drop-box {
            width: 45px;
            height: 55px;
            border: 2px dashed #bdc3c7;
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            background-color: #fcfcfc;
            transition: all 0.2s ease;
        }

        .drop-box.drag-over {
            background-color: #eaf2fb;
            border-color: #4a90e2;
            transform: scale(1.05);
        }

        .letter-pool {
            display: flex;
            flex-wrap: wrap;
            gap: 12px;
            justify-content: center;
            min-height: 80px;
            padding: 20px;
            background-color: #eef3f9;
            border-radius: 10px;
            margin-bottom: 30px;
        }

        .tile {
            width: 45px;
            height: 55px;
            background-color: #ffffff;
            border: 2px solid #dcdde1;
            border-radius: 8px;
            font-size: 1.6em;
            font-weight: bold;
            color: #2c3e50;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: grab;
            box-shadow: 0 4px 6px rgba(0,0,0,0.05);
            transition: transform 0.1s ease, box-shadow 0.1s ease, background-color 0.3s;
            text-transform: lowercase;
        }

        .tile:active {
            cursor: grabbing;
            transform: scale(0.95);
        }

        .tile.locked {
            background-color: #f1c40f !important; /* Gold for hints */
            color: #fff;
            border-color: #f39c12;
            cursor: not-allowed;
            box-shadow: none;
        }

        .tile.correct-animation {
            background-color: #2ecc71 !important;
            color: white;
            border-color: #27ae60;
            animation: pop 0.4s ease forwards;
        }

        @keyframes pop {
            0% { transform: scale(1); }
            50% { transform: scale(1.15); }
            100% { transform: scale(1); }
        }

        .controls {
            display: flex;
            justify-content: center;
            gap: 15px;
            margin-top: 20px;
        }

        button {
            padding: 12px 24px;
            font-size: 1.1em;
            font-weight: bold;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.2s;
        }

        .btn-hint {
            background-color: #f39c12;
            color: white;
            box-shadow: 0 4px 6px rgba(243, 156, 18, 0.3);
        }

        .btn-hint:hover:not(:disabled) { background-color: #e67e22; }
        
        .btn-hint:disabled {
            background-color: #bdc3c7;
            cursor: not-allowed;
            box-shadow: none;
        }

        .btn-next {
            background-color: #2ecc71;
            color: white;
            box-shadow: 0 4px 6px rgba(46, 204, 113, 0.3);
            display: none; /* Hidden until word is complete */
        }

        .btn-next:hover { background-color: #27ae60; }

        .btn-reset {
            background-color: #95a5a6;
            color: white;
            box-shadow: 0 4px 6px rgba(149, 165, 166, 0.3);
        }
        .btn-reset:hover { background-color: #7f8c8d; }

        .completion-message {
            display: none;
            font-size: 1.5em;
            color: #27ae60;
            font-weight: bold;
            margin-top: 20px;
        }

        /* Mobile tweaks */
        @media (max-width: 600px) {
            .tile, .drop-box {
                width: 38px;
                height: 48px;
                font-size: 1.3em;
            }
            .sentence-display { font-size: 1.1em; }
            .controls { flex-direction: column; }
            button { width: 100%; }
        }
    </style>
</head>
<body>

<div class="spelling-activity-wrapper">
    <div class="spelling-container" id="game-container">
        <div class="progress-indicator" id="progress-text">Word 1 of 13</div>
        
        <div class="sentence-display">
            <span id="sentence-pre"></span>
            <span class="drop-zone-container" id="drop-container">
                <!-- Drop boxes injected here by JS -->
            </span>
            <span id="sentence-post"></span>
        </div>

        <p style="font-size:0.9em; color:#7f8c8d; margin-bottom:10px;">Drag the letters to the boxes, or tap a letter to move it.</p>
        
        <div class="letter-pool" id="letter-pool">
            <!-- Draggable tiles injected here by JS -->
        </div>

        <div class="controls">
            <button class="btn-reset" onclick="resetCurrentWord()">Reset Letters</button>
            <button class="btn-hint" id="hint-btn" onclick="giveHint()">Hint: 1st Letter</button>
            <button class="btn-next" id="next-btn" onclick="nextWord()">Next Word &#8594;</button>
        </div>

        <div class="completion-message" id="completion-message">
            🎉 Great job! You completed all the spelling words! 🎉
        </div>
    </div>
</div>

<script>
    // The Spelling Words and Sentences
    const quizData = [
        { word: "calendar", pre: "I marked my birthday on the", post: "so I wouldn't forget." },
        { word: "school", pre: "Every morning, I take the bus to", post: "." },
        { word: "question", pre: "If you don't understand, ask a", post: "." },
        { word: "answer", pre: "I raised my hand because I knew the", post: "to the math problem." },
        { word: "annotate", pre: "The teacher asked us to", post: "the text by highlighting key phrases." },
        { word: "rhyme", pre: "\"Cat\" and \"hat\" are two words that", post: "." },
        { word: "character", pre: "My favorite", post: "in the book is the brave knight." },
        { word: "jewelry", pre: "She wore a beautiful silver necklace and other fine", post: "." },
        { word: "library", pre: "We went to the", post: "to borrow some new books to read." },
        { word: "people", pre: "There were a lot of", post: "waiting in line for the concert." },
        { word: "friend", pre: "I like to play at the park with my best", post: "." },
        { word: "neighbor", pre: "The person who lives next door to me is a very kind", post: "." },
        { word: "doctor", pre: "When I was feeling sick, my mom took me to see the", post: "." }
    ];

    let currentWordIndex = 0;
    let hintLevel = 0; // 0 = none, 1 = first letter shown, 2 = last letter shown
    let draggedTile = null;

    // DOM Elements
    const dropContainer = document.getElementById('drop-container');
    const letterPool = document.getElementById('letter-pool');
    const sentencePre = document.getElementById('sentence-pre');
    const sentencePost = document.getElementById('sentence-post');
    const progressText = document.getElementById('progress-text');
    const hintBtn = document.getElementById('hint-btn');
    const nextBtn = document.getElementById('next-btn');
    const completionMsg = document.getElementById('completion-message');

    // Initialize the game
    function loadWord(index) {
        if (index >= quizData.length) {
            showCompletion();
            return;
        }

        const data = quizData[index];
        hintLevel = 0;
        
        // Update UI Text
        progressText.innerText = `Word ${index + 1} of ${quizData.length}`;
        sentencePre.innerText = data.pre;
        sentencePost.innerText = data.post;
        hintBtn.innerText = "Hint: 1st Letter";
        hintBtn.disabled = false;
        nextBtn.style.display = "none";

        // Clear containers
        dropContainer.innerHTML = '';
        letterPool.innerHTML = '';

        // Generate Drop Boxes
        for (let i = 0; i < data.word.length; i++) {
            const box = document.createElement('div');
            box.classList.add('drop-box');
            box.dataset.index = i;
            
            // Drop zone event listeners
            box.addEventListener('dragover', handleDragOver);
            box.addEventListener('dragleave', handleDragLeave);
            box.addEventListener('drop', handleDrop);
            
            dropContainer.appendChild(box);
        }

        // Scramble Letters and Generate Tiles
        let scrambledLetters = scrambleString(data.word);
        scrambledLetters.forEach((letter, i) => {
            const tile = document.createElement('div');
            tile.classList.add('tile');
            tile.innerText = letter;
            tile.dataset.letter = letter;
            tile.dataset.id = `tile-${index}-${i}`;
            tile.id = `tile-${index}-${i}`;
            tile.draggable = true;

            // Drag and Drop (Desktop)
            tile.addEventListener('dragstart', handleDragStart);
            tile.addEventListener('dragend', handleDragEnd);

            // Tap/Click support (Mobile fallback)
            tile.addEventListener('click', handleTileClick);

            letterPool.appendChild(tile);
        });
    }

    // Scramble function (ensures it doesn't accidentally spell the word)
    function scrambleString(str) {
        let arr = str.split('');
        for (let i = arr.length - 1; i > 0; i--) {
            const j = Math.floor(Math.random() * (i + 1));
            [arr[i], arr[j]] = [arr[j], arr[i]];
        }
        if (arr.join('') === str && str.length > 1) {
            return scrambleString(str); // re-scramble if identical
        }
        return arr;
    }

    // --- Drag and Drop Logic ---

    function handleDragStart(e) {
        if (this.classList.contains('locked')) {
            e.preventDefault();
            return;
        }
        draggedTile = this;
        e.dataTransfer.effectAllowed = 'move';
        setTimeout(() => this.style.opacity = '0.5', 0);
    }

    function handleDragEnd() {
        this.style.opacity = '1';
        draggedTile = null;
        document.querySelectorAll('.drop-box').forEach(box => box.classList.remove('drag-over'));
    }

    function handleDragOver(e) {
        e.preventDefault();
        e.dataTransfer.dropEffect = 'move';
        this.classList.add('drag-over');
    }

    function handleDragLeave() {
        this.classList.remove('drag-over');
    }

    function handleDrop(e) {
        e.preventDefault();
        this.classList.remove('drag-over');

        if (!draggedTile || this.classList.contains('locked-box')) return;

        // If dropping into a box that already has a tile, swap them
        if (this.children.length > 0) {
            const existingTile = this.children[0];
            if (existingTile.classList.contains('locked')) return; // Can't swap locked hint
            
            // Move existing tile to where the dragged tile came from
            draggedTile.parentNode.appendChild(existingTile);
        }

        this.appendChild(draggedTile);
        checkWinCondition();
    }

    // --- Tap/Click Logic (For Touch Screens/Mobile) ---
    function handleTileClick() {
        if (this.classList.contains('locked') || nextBtn.style.display === "block") return;

        const currentParent = this.parentNode;

        // If tile is in the pool, move it to the first empty drop box
        if (currentParent.id === 'letter-pool') {
            const dropBoxes = Array.from(dropContainer.children);
            const firstEmptyBox = dropBoxes.find(box => box.children.length === 0);
            
            if (firstEmptyBox) {
                firstEmptyBox.appendChild(this);
                checkWinCondition();
            }
        } 
        // If tile is in a drop box, move it back to the pool
        else if (currentParent.classList.contains('drop-box')) {
            letterPool.appendChild(this);
        }
    }

    // --- Hint System Logic ---
    function giveHint() {
        const word = quizData[currentWordIndex].word;
        const targetIndex = (hintLevel === 0) ? 0 : word.length - 1;
        const targetLetter = word[targetIndex];
        const targetBox = dropContainer.children[targetIndex];

        // 1. Find a tile with the correct letter that IS NOT already locked
        const allTiles = Array.from(document.querySelectorAll('.tile'));
        const tileToLock = allTiles.find(t => t.dataset.letter === targetLetter && !t.classList.contains('locked'));

        if (!tileToLock) return; // Should not happen unless word is bugged

        // 2. If the target box is occupied by a different tile, move that tile back to the pool
        if (targetBox.children.length > 0) {
            const occupyingTile = targetBox.children[0];
            if (occupyingTile !== tileToLock) {
                letterPool.appendChild(occupyingTile);
            }
        }

        // 3. Put correct tile in the box and lock it
        targetBox.appendChild(tileToLock);
        tileToLock.classList.add('locked');
        tileToLock.draggable = false;
        targetBox.classList.add('locked-box'); // Prevent dropping into this box

        // 4. Update hint state
        hintLevel++;
        if (hintLevel === 1) {
            hintBtn.innerText = "Hint: Last Letter";
        } else if (hintLevel >= 2) {
            hintBtn.innerText = "No More Hints";
            hintBtn.disabled = true;
        }

        checkWinCondition();
    }

    // --- Game Flow Logic ---

    function checkWinCondition() {
        const boxes = Array.from(dropContainer.children);
        let currentSpelling = "";

        // Read letters currently in boxes
        boxes.forEach(box => {
            if (box.children.length > 0) {
                currentSpelling += box.children[0].dataset.letter;
            } else {
                currentSpelling += "_"; // Blank space
            }
        });

        const correctWord = quizData[currentWordIndex].word;

        if (currentSpelling === correctWord) {
            // User won!
            boxes.forEach((box, index) => {
                const tile = box.children[0];
                tile.draggable = false;
                tile.classList.remove('locked'); // Remove hint yellow
                setTimeout(() => tile.classList.add('correct-animation'), index * 100); // Cascade animation
            });
            hintBtn.disabled = true;
            nextBtn.style.display = "inline-block";
        }
    }

    function resetCurrentWord() {
        // Move all unlocked tiles back to the pool
        const allTiles = document.querySelectorAll('.tile:not(.locked)');
        allTiles.forEach(tile => letterPool.appendChild(tile));
    }

    function nextWord() {
        currentWordIndex++;
        loadWord(currentWordIndex);
    }

    function showCompletion() {
        document.getElementById('progress-text').style.display = "none";
        document.querySelector('.sentence-display').style.display = "none";
        document.querySelector('.letter-pool').style.display = "none";
        document.querySelector('.controls').style.display = "none";
        
        // Hide paragraph instructions
        const instructionP = document.querySelector('.spelling-container p');
        if (instructionP) instructionP.style.display = 'none';

        completionMsg.style.display = "block";
    }

    // Start the first word on load
    window.onload = () => loadWord(0);

</script>

</body>
</html>
