<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>5th Grade Spelling Practice</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Nunito:wght@400;700;900&display=swap');

        body {
            background-color: #e0e7ff;
            background-image: radial-gradient(#a5b4fc 2px, transparent 2px);
            background-size: 30px 30px;
            font-family: 'Nunito', sans-serif;
            color: #312e81;
        }

        .game-card {
            background: white;
            border-radius: 24px;
            box-shadow: 0 10px 25px -5px rgba(67, 56, 202, 0.2), 0 8px 10px -6px rgba(67, 56, 202, 0.2);
            border: 4px solid #818cf8;
        }

        /* Buttons */
        .btn {
            box-shadow: 0 4px 0 rgba(0,0,0,0.2);
            transition: transform 0.1s, box-shadow 0.1s;
        }
        .btn:active:not(:disabled) {
            transform: translateY(4px);
            box-shadow: 0 0 0 rgba(0,0,0,0.2);
        }

        /* Multiple Choice Options */
        .mc-option {
            background: #f8fafc;
            border: 3px solid #e2e8f0;
            color: #475569;
            transition: all 0.2s ease;
            box-shadow: 0 4px 0 #cbd5e1;
        }

        .mc-option:hover:not(:disabled) {
            background: #f1f5f9;
            transform: translateY(-2px);
            box-shadow: 0 6px 0 #cbd5e1;
        }

        .mc-option:active:not(:disabled) {
            transform: translateY(4px);
            box-shadow: 0 0 0 #cbd5e1;
        }

        .mc-option.selected {
            background: #e0e7ff;
            border-color: #6366f1;
            color: #4338ca;
            box-shadow: 0 4px 0 #4f46e5;
        }
        .mc-option.selected:active:not(:disabled) {
            transform: translateY(4px);
            box-shadow: 0 0 0 #4f46e5;
        }

        .mc-option.correct {
            background: #d1fae5 !important;
            border-color: #10b981 !important;
            color: #059669 !important;
            box-shadow: 0 4px 0 #047857 !important;
        }

        .mc-option.incorrect {
            background: #fee2e2 !important;
            border-color: #ef4444 !important;
            color: #b91c1c !important;
            box-shadow: 0 4px 0 #b91c1c !important;
        }

        /* Animations */
        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-6px); }
            75% { transform: translateX(6px); }
        }
        .animate-shake {
            animation: shake 0.4s ease-in-out;
        }

        @keyframes pop {
            0% { transform: scale(1); }
            50% { transform: scale(1.05); }
            100% { transform: scale(1); }
        }
        .animate-pop {
            animation: pop 0.4s ease-out;
        }

        /* Context Sentence Blank */
        .sentence-blank {
            display: inline-block;
            min-width: 100px;
            border-bottom: 3px solid #6366f1;
            margin: 0 5px;
            color: #4f46e5;
            font-weight: 900;
            text-align: center;
            padding: 0 10px;
        }
    </style>
</head>
<body class="min-h-screen flex items-center justify-center p-4 py-12">

    <main class="game-card w-full max-w-3xl p-6 md:p-10 text-center relative overflow-hidden">
        
        <!-- Header & Progress -->
        <header class="mb-8 flex flex-col md:flex-row justify-between items-center gap-4">
            <h1 class="text-3xl md:text-4xl font-black text-indigo-600 drop-shadow-sm uppercase tracking-wider">
                Find the Correct Spelling
            </h1>
            <div class="bg-indigo-100 text-indigo-800 px-4 py-2 rounded-full font-bold text-lg border-2 border-indigo-200 shrink-0">
                Word <span id="current-word-num">1</span> of <span id="total-words-num">14</span>
            </div>
        </header>

        <!-- Sentence Context -->
        <div class="bg-indigo-50 border border-indigo-100 rounded-2xl p-6 mb-8 shadow-inner">
            <p id="sentence-display" class="text-2xl md:text-3xl font-bold text-indigo-900 leading-relaxed">
                <!-- Sentence injected by JS -->
            </p>
        </div>

        <!-- Multiple Choice Options -->
        <div id="options-container" class="flex flex-col sm:flex-row flex-wrap justify-center gap-4 md:gap-6 mb-10 max-w-2xl mx-auto">
            <!-- Options injected by JS -->
        </div>

        <!-- Feedback Area -->
        <div id="feedback-message" class="text-2xl font-bold mb-6 h-8 text-transparent transition-colors">
            Good Job!
        </div>

        <!-- Controls -->
        <div class="flex flex-wrap justify-center gap-4">
            <button id="btn-check" class="btn bg-gradient-to-r from-indigo-500 to-blue-600 hover:from-indigo-600 hover:to-blue-700 text-white font-black py-4 px-10 rounded-2xl uppercase tracking-wide text-xl">
                Check Answer
            </button>
            <button id="btn-next" class="hidden btn bg-gradient-to-r from-emerald-400 to-emerald-600 hover:from-emerald-500 hover:to-emerald-700 text-white font-black py-4 px-10 rounded-2xl uppercase tracking-wide text-xl shadow-[0_4px_0_#047857]">
                Next Word ➔
            </button>
        </div>

    </main>

    <script>
        // --- GAME DATA ---
        // Includes common misspellings as distractors
        const wordData = [
            { word: "every", options: ["every", "evry", "everry"], sentence: "I brush my teeth [BLANK] single day." },
            { word: "very", options: ["very", "vary", "verry"], sentence: "Thank you [BLANK] much for the gift!" },
            { word: "finally", options: ["finally", "finaly", "finoly"], sentence: "We [BLANK] arrived at the beach after a long drive." },
            { word: "probably", options: ["probably", "probly", "probobly"], sentence: "It will [BLANK] rain tomorrow afternoon." },
            { word: "definite", options: ["definite", "definate", "defanite"], sentence: "We need a [BLANK] answer by tomorrow." },
            { word: "because", options: ["because", "becuse", "becuz"], sentence: "I am wearing a coat [BLANK] it is freezing." },
            { word: "often", options: ["often", "offen", "ofen"], sentence: "How [BLANK] do you practice playing the piano?" },
            { word: "before", options: ["before", "befor", "befour"], sentence: "Always wash your hands [BLANK] eating dinner." },
            { word: "after", options: ["after", "aftar", "affter"], sentence: "We can play video games [BLANK] we finish homework." },
            { word: "since", options: ["since", "sence", "sinse"], sentence: "I have lived in this town [BLANK] I was a baby." },
            { word: "always", options: ["always", "allways", "alway"], sentence: "She is [BLANK] kind and helpful to her friends." },
            { word: "beginning", options: ["beginning", "begining", "beggining"], sentence: "The [BLANK] of the movie was very exciting." },
            { word: "again", options: ["again", "agin", "agian"], sentence: "Can you please play that song [BLANK]?" },
            { word: "until", options: ["until", "untill", "untile"], sentence: "We have to wait [BLANK] the light turns green." }
        ];
        
        let words = [];
        let currentIndex = 0;

        // --- DOM ELEMENTS ---
        const sentenceDisplay = document.getElementById('sentence-display');
        const optionsContainer = document.getElementById('options-container');
        const btnCheck = document.getElementById('btn-check');
        const btnNext = document.getElementById('btn-next');
        const feedbackMsg = document.getElementById('feedback-message');
        const currentNumEl = document.getElementById('current-word-num');
        const totalNumEl = document.getElementById('total-words-num');

        // Helper to shuffle arrays
        function shuffleArray(array) {
            const arr = [...array];
            for (let i = arr.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [arr[i], arr[j]] = [arr[j], arr[i]];
            }
            return arr;
        }

        // --- INITIALIZATION ---
        function initGame() {
            // Shuffle the word list
            words = shuffleArray(wordData);
            totalNumEl.innerText = words.length;
            currentIndex = 0;
            loadWord();
        }

        function loadWord() {
            const currentData = words[currentIndex];
            currentNumEl.innerText = currentIndex + 1;
            
            // Reset UI
            optionsContainer.innerHTML = '';
            feedbackMsg.classList.remove('text-emerald-500', 'text-red-500');
            feedbackMsg.classList.add('text-transparent');
            feedbackMsg.innerText = "Placeholder";
            
            btnCheck.classList.remove('hidden');
            btnNext.classList.add('hidden');

            // Render Sentence
            const sentenceHTML = currentData.sentence.replace("[BLANK]", `<span class="sentence-blank"> _______ </span>`);
            sentenceDisplay.innerHTML = sentenceHTML;

            // Render Shuffled Options
            const shuffledOptions = shuffleArray(currentData.options);
            shuffledOptions.forEach(optionText => {
                const btn = document.createElement('button');
                btn.className = 'mc-option flex-1 min-w-[150px] text-xl md:text-2xl font-black py-4 px-6 rounded-2xl cursor-pointer';
                btn.innerText = optionText;
                btn.dataset.val = optionText;
                
                btn.addEventListener('click', () => {
                    // Deselect others
                    document.querySelectorAll('.mc-option').forEach(b => {
                        b.classList.remove('selected', 'incorrect', 'animate-shake');
                    });
                    // Select this one
                    btn.classList.add('selected');
                });
                
                optionsContainer.appendChild(btn);
            });
        }

        // --- GAME LOGIC ---
        function checkAnswer() {
            const currentData = words[currentIndex];
            const selectedBtn = document.querySelector('.mc-option.selected');

            if (!selectedBtn) {
                showFeedback("Please select a spelling first!", "error");
                return;
            }

            const userAnswer = selectedBtn.dataset.val;

            if (userAnswer === currentData.word) {
                // Success!
                showFeedback("Correct spelling!", "success");
                
                selectedBtn.classList.remove('selected');
                selectedBtn.classList.add('correct', 'animate-pop');

                // Fill in the blank
                sentenceDisplay.innerHTML = currentData.sentence.replace("[BLANK]", `<span class="text-emerald-500 uppercase border-b-4 border-emerald-500 pb-1">${currentData.word}</span>`);

                // Disable all buttons
                document.querySelectorAll('.mc-option').forEach(b => {
                    b.disabled = true;
                    if (b !== selectedBtn) b.classList.add('opacity-50');
                });

                // Swap controls
                btnCheck.classList.add('hidden');
                btnNext.classList.remove('hidden');
                btnNext.focus(); 

            } else {
                // Error
                showFeedback("Not quite! Try another one.", "error");
                selectedBtn.classList.add('incorrect', 'animate-shake');
                selectedBtn.classList.remove('selected');
            }
        }

        function showFeedback(text, type) {
            feedbackMsg.innerText = text;
            feedbackMsg.classList.remove('text-transparent', 'text-red-500', 'text-emerald-500');
            if (type === "success") {
                feedbackMsg.classList.add('text-emerald-500');
            } else {
                feedbackMsg.classList.add('text-red-500');
            }
        }

        function nextWord() {
            if (currentIndex < words.length - 1) {
                currentIndex++;
                loadWord();
            } else {
                // Game Over
                optionsContainer.innerHTML = '';
                sentenceDisplay.innerHTML = "You found all the correct spellings!";
                btnNext.classList.add('hidden');
                feedbackMsg.innerText = "Amazing Job!";
                feedbackMsg.classList.remove('text-transparent');
                feedbackMsg.classList.add('text-indigo-600', 'text-3xl');
                
                const playAgainBtn = document.createElement('button');
                playAgainBtn.className = 'btn bg-gradient-to-r from-pink-500 to-rose-500 hover:from-pink-600 hover:to-rose-600 text-white font-black py-4 px-10 rounded-2xl uppercase tracking-wide text-xl mt-4';
                playAgainBtn.innerText = 'Play Again';
                playAgainBtn.onclick = () => {
                    playAgainBtn.remove();
                    initGame();
                };
                document.querySelector('.flex-wrap').appendChild(playAgainBtn);
            }
        }

        // --- EVENT LISTENERS ---
        btnCheck.addEventListener('click', checkAnswer);
        btnNext.addEventListener('click', nextWord);

        // Start the game
        window.onload = initGame;

    </script>
</body>
</html>
