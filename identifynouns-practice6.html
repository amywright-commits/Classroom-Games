<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Crazy Tales: 3 Story Mad Libs</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Chewy&family=Nunito:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Nunito', sans-serif;
            background-color: #e0e7ff; /* Indigo 50 */
            background-image: radial-gradient(#a5b4fc 1px, transparent 1px);
            background-size: 25px 25px;
            min-height: 100vh;
        }

        h1, h2, h3, .chewy-font {
            font-family: 'Chewy', cursive;
        }

        .hidden-screen {
            display: none !important;
        }

        /* Generated Word Styling */
        .mad-lib-word {
            color: #ec4899; /* Pink 500 */
            font-weight: 900;
            text-decoration: underline;
            text-decoration-style: wavy;
            text-decoration-color: #fbcfe8;
            font-size: 110%;
            padding: 0 4px;
            transition: transform 0.2s;
            display: inline-block;
        }

        .mad-lib-word:hover {
            transform: scale(1.1) rotate(-2deg);
        }

        /* Animations */
        .fade-in { animation: fadeIn 0.4s ease-out forwards; }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(15px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .slide-in { animation: slideIn 0.3s ease-out forwards; }
        @keyframes slideIn {
            from { opacity: 0; transform: translateX(-20px); }
            to { opacity: 1; transform: translateX(0); }
        }

        /* Custom Input Styling */
        .story-input {
            border: 3px solid #cbd5e1;
            border-bottom-width: 6px;
            transition: all 0.2s;
        }
        .story-input:focus {
            outline: none;
            border-color: #818cf8;
            border-bottom-color: #4f46e5;
            transform: translateY(2px);
            border-bottom-width: 4px;
        }
    </style>
</head>
<body class="p-4 flex items-center justify-center">

    <div class="bg-white shadow-2xl rounded-3xl p-6 md:p-10 w-full max-w-4xl border-4 border-indigo-400">
        
        <!-- ==================== HEADER ==================== -->
        <div class="text-center mb-8 border-b-4 border-dashed border-indigo-100 pb-6">
            <h1 class="text-6xl text-indigo-600 mb-2 tracking-wide">🤪 Crazy Tales</h1>
            <p class="text-xl text-gray-500 font-bold">Pick a story, fill in the blanks, and laugh!</p>
        </div>

        <!-- ==================== SCREEN 1: STORY SELECTION ==================== -->
        <div id="selection-screen" class="fade-in space-y-6">
            <h2 class="text-3xl text-center text-gray-700 chewy-font mb-6">Which adventure do you want to play?</h2>
            
            <div class="grid grid-cols-1 md:grid-cols-3 gap-6">
                <!-- Story 1 Card -->
                <button onclick="selectStory(0)" class="bg-pink-50 hover:bg-pink-100 border-4 border-pink-300 rounded-2xl p-6 text-center transition-transform hover:scale-105 active:scale-95 group">
                    <div class="text-6xl mb-4 group-hover:animate-bounce">👽</div>
                    <h3 class="text-2xl text-pink-600 chewy-font">Alien Invasion</h3>
                    <p class="text-gray-600 font-bold mt-2 text-sm">A normal school day goes completely wrong.</p>
                </button>

                <!-- Story 2 Card -->
                <button onclick="selectStory(1)" class="bg-emerald-50 hover:bg-emerald-100 border-4 border-emerald-300 rounded-2xl p-6 text-center transition-transform hover:scale-105 active:scale-95 group">
                    <div class="text-6xl mb-4 group-hover:animate-bounce">🏕️</div>
                    <h3 class="text-2xl text-emerald-600 chewy-font">Wild Camping</h3>
                    <p class="text-gray-600 font-bold mt-2 text-sm">Beware of the creatures in the woods!</p>
                </button>

                <!-- Story 3 Card -->
                <button onclick="selectStory(2)" class="bg-amber-50 hover:bg-amber-100 border-4 border-amber-300 rounded-2xl p-6 text-center transition-transform hover:scale-105 active:scale-95 group">
                    <div class="text-6xl mb-4 group-hover:animate-bounce">👨‍🍳</div>
                    <h3 class="text-2xl text-amber-600 chewy-font">Chef Master</h3>
                    <p class="text-gray-600 font-bold mt-2 text-sm">Cook up the most disgusting recipe ever.</p>
                </button>
            </div>
        </div>

        <!-- ==================== SCREEN 2: INPUT FORM ==================== -->
        <div id="input-screen" class="hidden-screen fade-in">
            <div class="flex justify-between items-center mb-6">
                <h2 id="current-story-title" class="text-3xl text-indigo-600 chewy-font">Story Title</h2>
                <button onclick="resetGame()" class="text-gray-400 hover:text-red-500 font-bold transition-colors">
                    🔙 Go Back
                </button>
            </div>

            <div class="bg-indigo-50 p-6 rounded-2xl border-2 border-indigo-100 mb-8">
                <p class="text-lg text-indigo-800 font-bold mb-4">Fill in the blanks with the correct types of words to build your story!</p>
                
                <form id="word-form" class="space-y-4">
                    <!-- Input fields will be injected here by JavaScript -->
                </form>
            </div>

            <div class="text-center">
                <button onclick="generateStory(event)" class="bg-indigo-500 hover:bg-indigo-600 text-white text-3xl chewy-font py-4 px-12 rounded-full shadow-lg transition-transform hover:scale-105 active:scale-95 border-b-4 border-indigo-700 w-full md:w-auto">
                    Read My Story! 📖
                </button>
                <p id="error-msg" class="text-red-500 font-bold mt-4 opacity-0 transition-opacity">Please fill in all the blanks!</p>
            </div>
        </div>

        <!-- ==================== SCREEN 3: RESULT ==================== -->
        <div id="result-screen" class="hidden-screen fade-in text-center">
            <div class="bg-yellow-50 border-4 border-yellow-300 rounded-3xl p-8 mb-8 text-left shadow-inner relative overflow-hidden">
                <div class="absolute top-0 right-0 opacity-10 text-9xl -mt-6 -mr-4 pointer-events-none">⭐</div>
                
                <h2 id="result-title" class="text-4xl text-yellow-700 chewy-font mb-6 text-center border-b-2 border-yellow-200 pb-4">Story Title</h2>
                
                <p id="result-text" class="text-2xl text-gray-800 leading-relaxed font-bold">
                    <!-- The generated story goes here -->
                </p>
            </div>

            <button onclick="resetGame()" class="bg-pink-500 hover:bg-pink-600 text-white text-3xl chewy-font py-4 px-12 rounded-full shadow-lg transition-transform hover:scale-105 active:scale-95 border-b-4 border-pink-700">
                Play Another Story! 🔄
            </button>
        </div>

    </div>

    <!-- JavaScript Game Logic -->
    <script>
        // Data: 3 Different Stories with unique prompts and templates
        const stories = [
            {
                id: 0,
                title: "👽 The Alien Invasion",
                themeColor: "pink",
                prompts: [
                    { id: "word0", label: "Adjective (describing word)" },
                    { id: "word1", label: "Plural Noun (more than one thing)" },
                    { id: "word2", label: "Proper Noun (a Teacher's Name)" },
                    { id: "word3", label: "Animal" },
                    { id: "word4", label: "Verb (past tense ending in -ed)" },
                    { id: "word5", label: "A Silly Made-Up Word" }
                ],
                template: (words) => `It was a very <span class="mad-lib-word">${words[0]}</span> day at school. We were just sitting at our desks learning about <span class="mad-lib-word">${words[1]}</span> when <span class="mad-lib-word">${words[2]}</span> suddenly kicked the door open. Following right behind them was a giant, glowing, three-eyed <span class="mad-lib-word">${words[3]}</span>! The creature <span class="mad-lib-word">${words[4]}</span> all over the classroom chalkboard and yelled, "<span class="mad-lib-word">${words[5]}</span>!" at the top of its lungs. Best. Day. Ever.`
            },
            {
                id: 1,
                title: "🏕️ Wild Camping",
                themeColor: "emerald",
                prompts: [
                    { id: "word0", label: "Adjective (describing word)" },
                    { id: "word1", label: "Type of Food" },
                    { id: "word2", label: "Large Animal" },
                    { id: "word3", label: "Verb ending in -ing" },
                    { id: "word4", label: "Noun (a thing)" },
                    { id: "word5", label: "Plural Noun (more than one thing)" }
                ],
                template: (words) => `Last summer, my family went camping in the deep, <span class="mad-lib-word">${words[0]}</span> woods. It was dark, and we were roasting <span class="mad-lib-word">${words[1]}</span> over the campfire. Suddenly, we heard a twig snap. A massive <span class="mad-lib-word">${words[2]}</span> came <span class="mad-lib-word">${words[3]}</span> right into our camp! It ignored our food, stole my favorite <span class="mad-lib-word">${words[4]}</span>, and left behind a giant pile of <span class="mad-lib-word">${words[5]}</span>. We packed up and went to a hotel instead.`
            },
            {
                id: 2,
                title: "👨‍🍳 Chef Master",
                themeColor: "amber",
                prompts: [
                    { id: "word0", label: "Adjective (describing word)" },
                    { id: "word1", label: "A Type of Liquid" },
                    { id: "word2", label: "Food Item (Plural)" },
                    { id: "word3", label: "Verb (action word)" },
                    { id: "word4", label: "Emotion or Feeling (Noun)" },
                    { id: "word5", label: "Part of the Body" }
                ],
                template: (words) => `Welcome back to 'Chef Master'! Today we are making a delightfully <span class="mad-lib-word">${words[0]}</span> soup. First, you need to boil a giant pot full of <span class="mad-lib-word">${words[1]}</span>. Once it is bubbling, throw in a handful of chopped <span class="mad-lib-word">${words[2]}</span>. Use a large spoon to <span class="mad-lib-word">${words[3]}</span> the mixture vigorously for ten minutes. If you cook it perfectly, taking a bite will fill you with overwhelming <span class="mad-lib-word">${words[4]}</span>. Just be very careful not to accidentally burn your <span class="mad-lib-word">${words[5]}</span>!`
            }
        ];

        // State Variables
        let currentStoryIndex = null;

        // DOM Elements
        const selectionScreen = document.getElementById('selection-screen');
        const inputScreen = document.getElementById('input-screen');
        const resultScreen = document.getElementById('result-screen');
        const wordForm = document.getElementById('word-form');
        const currentStoryTitle = document.getElementById('current-story-title');
        const errorMsg = document.getElementById('error-msg');
        const resultTitle = document.getElementById('result-title');
        const resultText = document.getElementById('result-text');

        function selectStory(index) {
            currentStoryIndex = index;
            const story = stories[index];
            
            // Setup title
            currentStoryTitle.innerText = story.title;
            
            // Clear old form
            wordForm.innerHTML = '';
            errorMsg.style.opacity = '0';

            // Generate Input Fields with staggered animation
            story.prompts.forEach((prompt, i) => {
                const inputGroup = document.createElement('div');
                inputGroup.className = 'flex flex-col md:flex-row md:items-center gap-2 slide-in opacity-0';
                inputGroup.style.animationDelay = `${i * 0.1}s`; // Stagger the animation

                inputGroup.innerHTML = `
                    <label for="${prompt.id}" class="md:w-1/3 text-lg font-bold text-gray-700 chewy-font tracking-wide">${prompt.label}:</label>
                    <input type="text" id="${prompt.id}" class="story-input md:w-2/3 p-3 rounded-xl bg-white text-xl font-bold text-indigo-900 placeholder-gray-300" placeholder="Type word here..." autocomplete="off">
                `;
                wordForm.appendChild(inputGroup);
            });

            // Switch screens
            selectionScreen.classList.add('hidden-screen');
            inputScreen.classList.remove('hidden-screen');
            
            // Focus first input automatically
            setTimeout(() => {
                document.getElementById('word0').focus();
            }, 100);
        }

        function generateStory(e) {
            e.preventDefault(); // Prevent form submission if accidentally triggered
            
            const story = stories[currentStoryIndex];
            const collectedWords = [];
            let allFilled = true;

            // Collect inputs and check if empty
            for (let i = 0; i < story.prompts.length; i++) {
                const inputEl = document.getElementById(`word${i}`);
                const word = inputEl.value.trim();
                
                if (word === "") {
                    allFilled = false;
                    inputEl.classList.add('border-red-500'); // Highlight empty field
                } else {
                    inputEl.classList.remove('border-red-500');
                    collectedWords.push(word.toUpperCase()); // Capitalize for effect
                }
            }

            if (!allFilled) {
                errorMsg.style.opacity = '1';
                // Shake the button a little bit to show error
                errorMsg.classList.add('animate-bounce');
                setTimeout(() => errorMsg.classList.remove('animate-bounce'), 1000);
                return;
            }

            // If we have all words, generate!
            errorMsg.style.opacity = '0';
            
            // Build the final text
            resultTitle.innerText = story.title;
            resultText.innerHTML = story.template(collectedWords);

            // Switch screens
            inputScreen.classList.add('hidden-screen');
            resultScreen.classList.remove('hidden-screen');
        }

        function resetGame() {
            // Hide everything else and show selection screen
            inputScreen.classList.add('hidden-screen');
            resultScreen.classList.add('hidden-screen');
            selectionScreen.classList.remove('hidden-screen');
            
            currentStoryIndex = null;
        }
    </script>
</body>
</html>
