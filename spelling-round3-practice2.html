<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>5th Grade Spelling - Drag & Drop</title>
    <style>
        :root {
            --primary: #9B59B6;
            --primary-dark: #8E44AD;
            --secondary: #F1C40F;
            --secondary-dark: #F39C12;
            --success: #2ECC71;
            --danger: #E74C3C;
            --background: #F4F6F7;
            --card-bg: #FFFFFF;
            --text-main: #2C3E50;
            --text-light: #7F8C8D;
            --slot-bg: #EAEDED;
        }

        body {
            font-family: 'Comic Sans MS', 'Chalkboard SE', 'Marker Felt', sans-serif;
            background-color: var(--background);
            color: var(--text-main);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
            box-sizing: border-box;
        }

        .game-container {
            background-color: var(--card-bg);
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.1);
            width: 100%;
            max-width: 700px;
            padding: 30px 20px;
            text-align: center;
            position: relative;
            overflow: hidden;
        }

        h1 {
            color: var(--primary);
            margin-top: 0;
            font-size: 2.2em;
        }

        /* Progress Bar */
        .progress-container {
            width: 100%;
            background-color: #E0E0E0;
            border-radius: 10px;
            height: 20px;
            margin-bottom: 20px;
            overflow: hidden;
            box-shadow: inset 0 2px 5px rgba(0,0,0,0.1);
        }

        .progress-bar {
            height: 100%;
            background-color: var(--success);
            width: 0%;
            transition: width 0.5s ease-in-out;
            border-radius: 10px;
        }

        .instruction {
            font-size: 1.1em;
            color: var(--text-light);
            margin-bottom: 20px;
        }

        /* Drag and Drop Area */
        .play-area {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 30px;
            margin-bottom: 25px;
        }

        .slots-container, .pool-container {
            display: flex;
            justify-content: center;
            flex-wrap: wrap;
            gap: 10px;
            min-height: 70px;
            padding: 10px;
            border-radius: 15px;
            width: 100%;
        }

        .pool-container {
            background-color: #FAFAFA;
            border: 2px dashed #D5D8DC;
        }

        .slot {
            width: 50px;
            height: 55px;
            border: 3px dashed #BDC3C7;
            border-radius: 10px;
            background-color: var(--slot-bg);
            display: flex;
            justify-content: center;
            align-items: center;
            transition: background-color 0.2s, border-color 0.2s;
        }

        .slot.drag-over {
            background-color: #D6EAF8;
            border-color: var(--primary);
        }

        /* Letter Tiles */
        .tile {
            width: 50px;
            height: 55px;
            background-color: var(--primary);
            color: white;
            font-size: 1.8em;
            font-weight: bold;
            border-radius: 8px;
            display: flex;
            justify-content: center;
            align-items: center;
            cursor: grab;
            box-shadow: 0 4px 0 var(--primary-dark);
            user-select: none;
            text-transform: lowercase;
            transition: transform 0.1s, box-shadow 0.1s;
            touch-action: none; /* Prevents scrolling while dragging on mobile */
        }

        .tile:active {
            cursor: grabbing;
            transform: translateY(2px);
            box-shadow: 0 2px 0 var(--primary-dark);
        }

        .tile.selected {
            background-color: var(--secondary-dark);
            box-shadow: 0 0 10px var(--secondary);
            transform: scale(1.1) translateY(-2px);
        }

        .tile.dragging {
            opacity: 0.5;
        }

        /* Buttons */
        .button-group {
            display: flex;
            justify-content: center;
            gap: 15px;
            flex-wrap: wrap;
        }

        button {
            padding: 12px 25px;
            font-size: 1.2em;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            font-weight: bold;
            transition: transform 0.2s, background-color 0.2s;
            color: white;
            font-family: inherit;
        }

        button:active {
            transform: scale(0.95);
        }

        .btn-submit {
            background-color: var(--success);
            box-shadow: 0 4px 0 #27AE60;
        }
        .btn-submit:hover { background-color: #2ECC71; }

        .btn-hint {
            background-color: var(--secondary);
            box-shadow: 0 4px 0 var(--secondary-dark);
        }
        .btn-hint:hover { background-color: #F5B041; }

        .btn-restart {
            background-color: var(--primary);
            box-shadow: 0 4px 0 var(--primary-dark);
            display: none;
            margin: 20px auto;
        }

        /* Feedback */
        .feedback {
            margin-top: 20px;
            font-size: 1.3em;
            font-weight: bold;
            min-height: 30px;
        }

        .hint-text {
            margin-top: 15px;
            font-size: 1.1em;
            color: var(--primary-dark);
            background-color: #F4ECF7;
            padding: 10px;
            border-radius: 8px;
            border: 1px dashed var(--primary);
            display: none;
        }

        /* Animations */
        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-10px); }
            50% { transform: translateX(10px); }
            75% { transform: translateX(-10px); }
        }

        .shake {
            animation: shake 0.4s ease-in-out;
        }

        .slot.error { border-color: var(--danger); background-color: #FADBD8; }
        .slot.correct { border-color: var(--success); background-color: #D5F5E3; }

        #end-screen { display: none; }
        .confetti { font-size: 4em; margin: 0; }

        @media (max-width: 480px) {
            .tile, .slot { width: 40px; height: 45px; font-size: 1.4em; }
            .button-group { flex-direction: column; }
            button { width: 100%; }
        }
    </style>
</head>
<body>

    <div class="game-container">
        <!-- Progress Bar -->
        <div class="progress-container" id="progress-container">
            <div class="progress-bar" id="progress-bar"></div>
        </div>

        <!-- Main Game Area -->
        <div id="game-screen">
            <h1>Tile Scramble! 🧩</h1>
            <p class="instruction">Drag the letters into the boxes (or tap to move them) to spell the word.</p>
            
            <div class="play-area" id="play-area">
                <!-- Drop Zones -->
                <div class="slots-container" id="slots-container"></div>
                <!-- Draggable Tiles -->
                <div class="pool-container" id="pool-container"></div>
            </div>
            
            <div class="button-group">
                <button class="btn-submit" id="submit-btn" onclick="checkAnswer()">Check Answer</button>
                <button class="btn-hint" id="hint-btn" onclick="showHint()">Get a Hint 💡</button>
            </div>

            <div class="hint-text" id="hint-text"></div>
            <div class="feedback" id="feedback-msg"></div>
        </div>

        <!-- End Screen -->
        <div id="end-screen">
            <div class="confetti">🎉🏆🌟</div>
            <h1>Amazing Job!</h1>
            <p class="instruction">You successfully unscrambled all the tricky words!</p>
            <button class="btn-restart" id="restart-btn" style="display: block;" onclick="initGame()">Play Again</button>
        </div>
    </div>

    <script>
        const wordList = [
            { word: "laugh", hint: "You do this when someone tells a funny joke. (Hint: Think of 'a' and 'u' doing it together!)" },
            { word: "embarrass", hint: "To make someone's face turn red because they feel awkward. (Hint: Double trouble! Two R's and two S's.)" },
            { word: "separate", hint: "To pull things apart so they aren't together anymore. (Hint: There is a 'rat' in the middle.)" },
            { word: "decide", hint: "When you have to pick between two things, you must do this. (Hint: Ends with the sound 'ide'.)" },
            { word: "ignore", hint: "When you pretend you don't hear someone talking to you. (Hint: Ends with the word 'ore'.)" },
            { word: "believe", hint: "To think that something is absolutely true. (Hint: Remember the rule: 'i' before 'e'!)" },
            { word: "bought", hint: "The past tense of 'buy'. I ____ a candy bar yesterday. (Hint: Uses the tricky 'ough' ending.)" },
            { word: "thought", hint: "An idea that pops into your head. (Hint: Uses the tricky 'ough' ending.)" },
            { word: "favorite", hint: "The one you like the very most out of all the options. (Hint: Ends with 'ite' (i-t-e).)" },
            { word: "different", hint: "The opposite of 'the same'. (Hint: Don't forget the double 'f' and the 'er' in the middle!)" },
            { word: "beautiful", hint: "Something that is very, very pretty to look at. (Hint: Remember the vowel pattern: e-a-u.)" },
            { word: "interesting", hint: "Something that holds your attention because it's cool to learn about. (Hint: Don't skip the 'er' in the middle: int-er-esting.)" },
            { word: "terrible", hint: "Something that is extremely bad or awful. (Hint: Has a double 'r' in the middle.)" },
            { word: "excited", hint: "How you feel right before going to an amusement park! (Hint: Starts with 'ex' and hides a 'c' before the 'i'.)" },
            { word: "weird", hint: "Something very strange or unusual. (Hint: Rule breaker! It's 'e' before 'i' for this word.)" },
            { word: "quiet", hint: "Shhh... making zero noise. (Hint: Ends with 'iet' (i-e-t).)" }
        ];

        let currentWords = [];
        let currentIndex = 0;
        let selectedTile = null;

        const slotsContainer = document.getElementById('slots-container');
        const poolContainer = document.getElementById('pool-container');
        const hintText = document.getElementById('hint-text');
        const feedbackMsg = document.getElementById('feedback-msg');
        const progressBar = document.getElementById('progress-bar');
        const gameScreen = document.getElementById('game-screen');
        const endScreen = document.getElementById('end-screen');
        const playArea = document.getElementById('play-area');

        function shuffle(array) {
            let currentIndex = array.length, randomIndex;
            while (currentIndex != 0) {
                randomIndex = Math.floor(Math.random() * currentIndex);
                currentIndex--;
                [array[currentIndex], array[randomIndex]] = [array[randomIndex], array[currentIndex]];
            }
            return array;
        }

        function scrambleString(word) {
            let arr = word.split('');
            let isDifferent = false;
            // Ensure the scrambled version is not exactly the same as the original
            while (!isDifferent && arr.length > 1) {
                arr = shuffle(arr);
                if (arr.join('') !== word) isDifferent = true;
            }
            return arr;
        }

        function initGame() {
            currentWords = shuffle([...wordList]);
            currentIndex = 0;
            gameScreen.style.display = 'block';
            endScreen.style.display = 'none';
            document.getElementById('progress-container').style.display = 'block';
            updateProgress();
            loadWord();
        }

        function loadWord() {
            const currentObj = currentWords[currentIndex];
            hintText.style.display = 'none';
            hintText.textContent = currentObj.hint;
            feedbackMsg.textContent = '';
            selectedTile = null;

            slotsContainer.innerHTML = '';
            poolContainer.innerHTML = '';
            playArea.classList.remove('shake');

            const wordLength = currentObj.word.length;
            const scrambledLetters = scrambleString(currentObj.word);

            // Create Slots
            for (let i = 0; i < wordLength; i++) {
                const slot = document.createElement('div');
                slot.classList.add('slot');
                setupSlotEvents(slot);
                slotsContainer.appendChild(slot);
            }

            // Create Tiles
            scrambledLetters.forEach((letter, i) => {
                const tile = document.createElement('div');
                tile.classList.add('tile');
                tile.textContent = letter;
                tile.draggable = true;
                tile.id = 'tile-' + i;
                setupTileEvents(tile);
                poolContainer.appendChild(tile);
            });
            
            // Setup pool to receive tiles back
            setupPoolEvents();
        }

        function updateProgress() {
            const percentage = (currentIndex / currentWords.length) * 100;
            progressBar.style.width = percentage + '%';
        }

        // --- Drag & Drop / Click Logic ---

        function handleTileClick(tile) {
            if (selectedTile === tile) {
                // Deselect if clicked again
                tile.classList.remove('selected');
                selectedTile = null;
            } else {
                if (selectedTile) selectedTile.classList.remove('selected');
                selectedTile = tile;
                tile.classList.add('selected');
            }
        }

        function setupTileEvents(tile) {
            // Drag Events
            tile.addEventListener('dragstart', (e) => {
                selectedTile = tile;
                tile.classList.add('selected');
                e.dataTransfer.setData('text/plain', tile.id);
                setTimeout(() => tile.classList.add('dragging'), 0);
            });

            tile.addEventListener('dragend', () => {
                tile.classList.remove('dragging');
                if (selectedTile) selectedTile.classList.remove('selected');
                selectedTile = null;
            });

            // Click Fallback for touch/accessibility
            tile.addEventListener('click', (e) => {
                e.stopPropagation();
                // If it's in a slot and no other tile is selected, send back to pool
                if (tile.parentElement.classList.contains('slot') && !selectedTile) {
                    poolContainer.appendChild(tile);
                    return;
                }
                handleTileClick(tile);
            });
        }

        function setupSlotEvents(slot) {
            slot.addEventListener('dragover', e => {
                e.preventDefault();
                slot.classList.add('drag-over');
            });

            slot.addEventListener('dragleave', () => {
                slot.classList.remove('drag-over');
            });

            slot.addEventListener('drop', e => {
                e.preventDefault();
                slot.classList.remove('drag-over');
                placeTileInSlot(slot);
            });

            // Click Fallback
            slot.addEventListener('click', () => {
                if (selectedTile) {
                    placeTileInSlot(slot);
                } else if (slot.children.length > 0) {
                    // Send tile back to pool if slot is clicked
                    poolContainer.appendChild(slot.children[0]);
                }
            });
        }
        
        function setupPoolEvents() {
            poolContainer.addEventListener('dragover', e => e.preventDefault());
            poolContainer.addEventListener('drop', e => {
                e.preventDefault();
                if (selectedTile) poolContainer.appendChild(selectedTile);
            });
            poolContainer.addEventListener('click', () => {
                if (selectedTile) {
                    poolContainer.appendChild(selectedTile);
                    selectedTile.classList.remove('selected');
                    selectedTile = null;
                }
            });
        }

        function placeTileInSlot(slot) {
            if (!selectedTile) return;
            
            // If slot already has a tile, swap it back to pool
            if (slot.children.length > 0) {
                poolContainer.appendChild(slot.children[0]);
            }
            slot.appendChild(selectedTile);
            selectedTile.classList.remove('selected');
            selectedTile = null;
        }

        // --- Game Logic ---

        function checkAnswer() {
            const slots = document.querySelectorAll('.slot');
            let currentSpelling = '';
            let allFilled = true;

            slots.forEach(slot => {
                slot.classList.remove('error', 'correct');
                if (slot.children.length > 0) {
                    currentSpelling += slot.children[0].textContent;
                } else {
                    allFilled = false;
                }
            });

            const targetWord = currentWords[currentIndex].word;

            if (!allFilled) {
                feedbackMsg.textContent = "Oops! Fill all the boxes first. 📦";
                feedbackMsg.style.color = "var(--secondary-dark)";
                return;
            }

            if (currentSpelling === targetWord) {
                // Correct
                feedbackMsg.textContent = "Awesome job! 🌟";
                feedbackMsg.style.color = "var(--success)";
                slots.forEach(slot => slot.classList.add('correct'));
                
                setTimeout(() => {
                    currentIndex++;
                    if (currentIndex < currentWords.length) {
                        updateProgress();
                        loadWord();
                    } else {
                        endGame();
                    }
                }, 1200);

            } else {
                // Incorrect
                feedbackMsg.textContent = "Not quite right! Try rearranging. ❌";
                feedbackMsg.style.color = "var(--danger)";
                slots.forEach(slot => slot.classList.add('error'));
                
                playArea.classList.remove('shake');
                void playArea.offsetWidth; // trigger reflow
                playArea.classList.add('shake');
            }
        }

        function showHint() {
            hintText.style.display = 'block';
        }

        function endGame() {
            progressBar.style.width = '100%';
            setTimeout(() => {
                gameScreen.style.display = 'none';
                document.getElementById('progress-container').style.display = 'none';
                endScreen.style.display = 'block';
            }, 500);
        }

        window.onload = initGame;
    </script>
</body>
</html>
