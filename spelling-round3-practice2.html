<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>5th Grade Spelling - Drag & Drop</title>
    <style>
        :root {
            --primary: #9B59B6;
            --primary-dark: #8E44AD;
            --secondary: #F1C40F;
            --secondary-dark: #F39C12;
            --success: #2ECC71;
            --danger: #E74C3C;
            --background: #F4F6F7;
            --card-bg: #FFFFFF;
            --text-main: #2C3E50;
            --text-light: #7F8C8D;
            --slot-bg: #EAEDED;
        }

        body {
            font-family: 'Comic Sans MS', 'Chalkboard SE', 'Marker Felt', sans-serif;
            background-color: var(--background);
            color: var(--text-main);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
            box-sizing: border-box;
        }

        .game-container {
            background-color: var(--card-bg);
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.1);
            width: 100%;
            max-width: 700px;
            padding: 30px 20px;
            text-align: center;
            position: relative;
            overflow: hidden;
        }

        h1 {
            color: var(--primary);
            margin-top: 0;
            font-size: 2.2em;
        }

        /* Progress Bar */
        .progress-container {
            width: 100%;
            background-color: #E0E0E0;
            border-radius: 10px;
            height: 20px;
            margin-bottom: 20px;
            overflow: hidden;
            box-shadow: inset 0 2px 5px rgba(0,0,0,0.1);
        }

        .progress-bar {
            height: 100%;
            background-color: var(--success);
            width: 0%;
            transition: width 0.5s ease-in-out;
            border-radius: 10px;
        }

        .instruction {
            font-size: 1.1em;
            color: var(--text-light);
            margin-bottom: 20px;
        }

        /* Drag and Drop Area */
        .play-area {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 30px;
            margin-bottom: 25px;
        }

        .slots-container, .pool-container {
            display: flex;
            justify-content: center;
            flex-wrap: wrap;
            gap: 10px;
            min-height: 70px;
            padding: 10px;
            border-radius: 15px;
            width: 100%;
        }

        .pool-container {
            background-color: #FAFAFA;
            border: 2px dashed #D5D8DC;
        }

        .slot {
            width: 50px;
            height: 55px;
            border: 3px dashed #BDC3C7;
            border-radius: 10px;
            background-color: var(--slot-bg);
            display: flex;
            justify-content: center;
            align-items: center;
            transition: background-color 0.2s, border-color 0.2s;
        }

        .slot.drag-over {
            background-color: #D6EAF8;
            border-color: var(--primary);
        }

        /* Letter Tiles */
        .tile {
            width: 50px;
            height: 55px;
            background-color: var(--primary);
            color: white;
            font-size: 1.8em;
            font-weight: bold;
            border-radius: 8px;
            display: flex;
            justify-content: center;
            align-items: center;
            cursor: grab;
            box-shadow: 0 4px 0 var(--primary-dark);
            user-select: none;
            text-transform: lowercase;
            transition: transform 0.1s, box-shadow 0.1s;
            touch-action: none;
        }

        .tile:active {
            cursor: grabbing;
            transform: translateY(2px);
            box-shadow: 0 2px 0 var(--primary-dark);
        }

        .tile.selected {
            background-color: var(--secondary-dark);
            box-shadow: 0 0 10px var(--secondary);
            transform: scale(1.1) translateY(-2px);
        }

        .tile.dragging {
            opacity: 0.5;
        }

        /* Locked Tile (Hinted) */
        .slot.locked-slot {
            border-color: var(--success);
            background-color: #D5F5E3;
        }

        .tile.locked {
            background-color: var(--success);
            box-shadow: 0 4px 0 #27AE60;
            cursor: default;
            transform: none !important;
        }

        /* Buttons */
        .button-group {
            display: flex;
            justify-content: center;
            gap: 15px;
            flex-wrap: wrap;
        }

        button {
            padding: 12px 25px;
            font-size: 1.2em;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            font-weight: bold;
            transition: transform 0.2s, background-color 0.2s;
            color: white;
            font-family: inherit;
        }

        button:active {
            transform: scale(0.95);
        }

        .btn-submit {
            background-color: var(--success);
            box-shadow: 0 4px 0 #27AE60;
        }
        .btn-submit:hover { background-color: #2ECC71; }

        .btn-hint {
            background-color: var(--secondary);
            box-shadow: 0 4px 0 var(--secondary-dark);
        }
        .btn-hint:hover { background-color: #F5B041; }

        .btn-restart {
            background-color: var(--primary);
            box-shadow: 0 4px 0 var(--primary-dark);
            display: none;
            margin: 20px auto;
        }

        /* Feedback */
        .feedback {
            margin-top: 20px;
            font-size: 1.3em;
            font-weight: bold;
            min-height: 30px;
        }

        /* Animations */
        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-10px); }
            50% { transform: translateX(10px); }
            75% { transform: translateX(-10px); }
        }

        .shake {
            animation: shake 0.4s ease-in-out;
        }

        .slot.error { border-color: var(--danger); background-color: #FADBD8; }
        .slot.correct { border-color: var(--success); background-color: #D5F5E3; }

        #end-screen { display: none; }
        .confetti { font-size: 4em; margin: 0; }

        @media (max-width: 480px) {
            .tile, .slot { width: 40px; height: 45px; font-size: 1.4em; }
            .button-group { flex-direction: column; }
            button { width: 100%; }
        }
    </style>
</head>
<body>

    <div class="game-container">
        <!-- Progress Bar -->
        <div class="progress-container" id="progress-container">
            <div class="progress-bar" id="progress-bar"></div>
        </div>

        <!-- Main Game Area -->
        <div id="game-screen">
            <h1>Tile Scramble! 🧩</h1>
            <p class="instruction">Drag the letters into the boxes to spell the word.</p>
            
            <div class="play-area" id="play-area">
                <!-- Drop Zones -->
                <div class="slots-container" id="slots-container"></div>
                <!-- Draggable Tiles -->
                <div class="pool-container" id="pool-container"></div>
            </div>
            
            <div class="button-group">
                <button class="btn-submit" id="submit-btn" onclick="checkAnswer()">Check Answer</button>
                <button class="btn-hint" id="hint-btn" onclick="showHint()">Get a Hint 💡</button>
            </div>

            <div class="feedback" id="feedback-msg"></div>
        </div>

        <!-- End Screen -->
        <div id="end-screen">
            <div class="confetti">🎉🏆🌟</div>
            <h1>Amazing Job!</h1>
            <p class="instruction">You successfully unscrambled all the tricky words!</p>
            <button class="btn-restart" id="restart-btn" style="display: block;" onclick="initGame()">Play Again</button>
        </div>
    </div>

    <script>
        const wordList = [
            "laugh", "embarrass", "separate", "decide", "ignore", 
            "believe", "bought", "thought", "favorite", "different", 
            "beautiful", "interesting", "terrible", "excited", "weird", "quiet"
        ];

        let currentWords = [];
        let currentIndex = 0;
        let selectedTile = null;

        // Hint tracking
        let hintSequence = [];
        let currentHintStep = 0;

        const slotsContainer = document.getElementById('slots-container');
        const poolContainer = document.getElementById('pool-container');
        const feedbackMsg = document.getElementById('feedback-msg');
        const progressBar = document.getElementById('progress-bar');
        const gameScreen = document.getElementById('game-screen');
        const endScreen = document.getElementById('end-screen');
        const playArea = document.getElementById('play-area');

        function shuffle(array) {
            let currentIndex = array.length, randomIndex;
            while (currentIndex != 0) {
                randomIndex = Math.floor(Math.random() * currentIndex);
                currentIndex--;
                [array[currentIndex], array[randomIndex]] = [array[randomIndex], array[currentIndex]];
            }
            return array;
        }

        function scrambleString(word) {
            let arr = word.split('');
            let isDifferent = false;
            while (!isDifferent && arr.length > 1) {
                arr = shuffle(arr);
                if (arr.join('') !== word) isDifferent = true;
            }
            return arr;
        }

        function initGame() {
            currentWords = shuffle([...wordList]);
            currentIndex = 0;
            gameScreen.style.display = 'block';
            endScreen.style.display = 'none';
            document.getElementById('progress-container').style.display = 'block';
            updateProgress();
            loadWord();
        }

        function loadWord() {
            const targetWord = currentWords[currentIndex];
            feedbackMsg.textContent = '';
            selectedTile = null;
            currentHintStep = 0;

            slotsContainer.innerHTML = '';
            poolContainer.innerHTML = '';
            playArea.classList.remove('shake');

            const wordLength = targetWord.length;
            const scrambledLetters = scrambleString(targetWord);

            // Generate Hint Sequence: 1st, Last, 2nd, 3rd, 4th...
            hintSequence = [0];
            if (wordLength > 1) {
                hintSequence.push(wordLength - 1);
                for (let i = 1; i < wordLength - 1; i++) {
                    hintSequence.push(i);
                }
            }

            // Create Slots
            for (let i = 0; i < wordLength; i++) {
                const slot = document.createElement('div');
                slot.classList.add('slot');
                setupSlotEvents(slot);
                slotsContainer.appendChild(slot);
            }

            // Create Tiles
            scrambledLetters.forEach((letter, i) => {
                const tile = document.createElement('div');
                tile.classList.add('tile');
                tile.textContent = letter;
                tile.draggable = true;
                tile.id = 'tile-' + i;
                setupTileEvents(tile);
                poolContainer.appendChild(tile);
            });
            
            setupPoolEvents();
        }

        function updateProgress() {
            const percentage = (currentIndex / currentWords.length) * 100;
            progressBar.style.width = percentage + '%';
        }

        // --- Hint Logic ---
        function showHint() {
            const targetWord = currentWords[currentIndex];
            const slots = document.querySelectorAll('.slot');
            let hintProvided = false;

            while (currentHintStep < hintSequence.length && !hintProvided) {
                const targetIndex = hintSequence[currentHintStep];
                const targetLetter = targetWord[targetIndex];
                const slot = slots[targetIndex];

                // Check if the correct tile is already here but not locked
                if (slot.children.length > 0 && slot.children[0].textContent === targetLetter) {
                    if (!slot.classList.contains('locked-slot')) {
                        lockTileInSlot(slot.children[0], slot);
                        feedbackMsg.textContent = "Locked a correct letter! 🔒";
                        feedbackMsg.style.color = "var(--success)";
                        hintProvided = true;
                    }
                } 
                // Check if a wrong tile is here
                else if (slot.children.length > 0 && slot.children[0].textContent !== targetLetter) {
                    poolContainer.appendChild(slot.children[0]); // Kick to pool
                    
                    let foundTile = findTileWithLetter(targetLetter, targetIndex);
                    if (foundTile) {
                        slot.appendChild(foundTile);
                        lockTileInSlot(foundTile, slot);
                        feedbackMsg.textContent = "Here's a letter! 💡";
                        feedbackMsg.style.color = "var(--secondary-dark)";
                        hintProvided = true;
                    }
                } 
                // Slot is empty
                else {
                    let foundTile = findTileWithLetter(targetLetter, targetIndex);
                    if (foundTile) {
                        slot.appendChild(foundTile);
                        lockTileInSlot(foundTile, slot);
                        feedbackMsg.textContent = "Here's a letter! 💡";
                        feedbackMsg.style.color = "var(--secondary-dark)";
                        hintProvided = true;
                    }
                }
                
                currentHintStep++;
            }

            // If we've shown all hints, tell the user or automatically finish the puzzle
            if (!hintProvided && currentHintStep >= hintSequence.length) {
                checkAnswer();
                if (feedbackMsg.textContent !== "Awesome job! 🌟") {
                    feedbackMsg.textContent = "No more hints available! 🧠";
                    feedbackMsg.style.color = "var(--secondary-dark)";
                }
            }
        }

        function findTileWithLetter(letter, targetIndex) {
            // 1. Check pool
            let tilesInPool = Array.from(poolContainer.children);
            let found = tilesInPool.find(t => t.textContent === letter);
            if (found) return found;

            // 2. Check slots (don't take locked ones, prefer taking from wrong slots)
            const slots = document.querySelectorAll('.slot');
            const targetWord = currentWords[currentIndex];
            
            for (let i = 0; i < slots.length; i++) {
                if (i === targetIndex) continue;
                const slot = slots[i];
                if (slot.children.length > 0) {
                    const tile = slot.children[0];
                    if (tile.textContent === letter && !tile.classList.contains('locked')) {
                        // Return it if it's currently placed in the wrong spot
                        if (targetWord[i] !== letter) return tile;
                    }
                }
            }

            // 3. Fallback: Take any unlocked tile with that letter
            for (let i = 0; i < slots.length; i++) {
                if (i === targetIndex) continue;
                const slot = slots[i];
                if (slot.children.length > 0) {
                    const tile = slot.children[0];
                    if (tile.textContent === letter && !tile.classList.contains('locked')) {
                        return tile;
                    }
                }
            }
            return null;
        }

        function lockTileInSlot(tile, slot) {
            tile.draggable = false;
            tile.classList.add('locked');
            tile.classList.remove('selected');
            slot.classList.add('locked-slot');
            if (selectedTile === tile) selectedTile = null;
        }

        // --- Drag & Drop / Click Logic ---

        function handleTileClick(tile) {
            if (tile.classList.contains('locked')) return;

            if (selectedTile === tile) {
                tile.classList.remove('selected');
                selectedTile = null;
            } else {
                if (selectedTile) selectedTile.classList.remove('selected');
                selectedTile = tile;
                tile.classList.add('selected');
            }
        }

        function setupTileEvents(tile) {
            tile.addEventListener('dragstart', (e) => {
                if (tile.classList.contains('locked')) {
                    e.preventDefault();
                    return;
                }
                selectedTile = tile;
                tile.classList.add('selected');
                e.dataTransfer.setData('text/plain', tile.id);
                setTimeout(() => tile.classList.add('dragging'), 0);
            });

            tile.addEventListener('dragend', () => {
                tile.classList.remove('dragging');
                if (selectedTile && !selectedTile.classList.contains('locked')) {
                    selectedTile.classList.remove('selected');
                }
                selectedTile = null;
            });

            tile.addEventListener('click', (e) => {
                e.stopPropagation();
                if (tile.classList.contains('locked')) return;

                if (tile.parentElement.classList.contains('slot') && !selectedTile) {
                    poolContainer.appendChild(tile);
                    return;
                }
                handleTileClick(tile);
            });
        }

        function setupSlotEvents(slot) {
            slot.addEventListener('dragover', e => {
                if (slot.classList.contains('locked-slot')) return;
                e.preventDefault();
                slot.classList.add('drag-over');
            });

            slot.addEventListener('dragleave', () => {
                slot.classList.remove('drag-over');
            });

            slot.addEventListener('drop', e => {
                if (slot.classList.contains('locked-slot')) return;
                e.preventDefault();
                slot.classList.remove('drag-over');
                placeTileInSlot(slot);
            });

            slot.addEventListener('click', () => {
                if (slot.classList.contains('locked-slot')) return;
                if (selectedTile) {
                    placeTileInSlot(slot);
                } else if (slot.children.length > 0) {
                    poolContainer.appendChild(slot.children[0]);
                }
            });
        }
        
        function setupPoolEvents() {
            poolContainer.addEventListener('dragover', e => e.preventDefault());
            poolContainer.addEventListener('drop', e => {
                e.preventDefault();
                if (selectedTile) poolContainer.appendChild(selectedTile);
            });
            poolContainer.addEventListener('click', () => {
                if (selectedTile) {
                    poolContainer.appendChild(selectedTile);
                    selectedTile.classList.remove('selected');
                    selectedTile = null;
                }
            });
        }

        function placeTileInSlot(slot) {
            if (!selectedTile) return;
            if (slot.classList.contains('locked-slot')) return;
            
            // If slot already has an unlocked tile, swap it back to pool
            if (slot.children.length > 0) {
                poolContainer.appendChild(slot.children[0]);
            }
            slot.appendChild(selectedTile);
            selectedTile.classList.remove('selected');
            selectedTile = null;
        }

        // --- Game Logic ---

        function checkAnswer() {
            const slots = document.querySelectorAll('.slot');
            let currentSpelling = '';
            let allFilled = true;

            slots.forEach(slot => {
                slot.classList.remove('error', 'correct');
                if (slot.children.length > 0) {
                    currentSpelling += slot.children[0].textContent;
                } else {
                    allFilled = false;
                }
            });

            const targetWord = currentWords[currentIndex];

            if (!allFilled) {
                feedbackMsg.textContent = "Oops! Fill all the boxes first. 📦";
                feedbackMsg.style.color = "var(--secondary-dark)";
                return;
            }

            if (currentSpelling === targetWord) {
                feedbackMsg.textContent = "Awesome job! 🌟";
                feedbackMsg.style.color = "var(--success)";
                slots.forEach(slot => slot.classList.add('correct'));
                
                setTimeout(() => {
                    currentIndex++;
                    if (currentIndex < currentWords.length) {
                        updateProgress();
                        loadWord();
                    } else {
                        endGame();
                    }
                }, 1200);

            } else {
                feedbackMsg.textContent = "Not quite right! Try rearranging. ❌";
                feedbackMsg.style.color = "var(--danger)";
                slots.forEach(slot => {
                    // Don't red-highlight locked hints
                    if (!slot.classList.contains('locked-slot')) {
                        slot.classList.add('error');
                    }
                });
                
                playArea.classList.remove('shake');
                void playArea.offsetWidth; 
                playArea.classList.add('shake');
            }
        }

        function endGame() {
            progressBar.style.width = '100%';
            setTimeout(() => {
                gameScreen.style.display = 'none';
                document.getElementById('progress-container').style.display = 'none';
                endScreen.style.display = 'block';
            }, 500);
        }

        window.onload = initGame;
    </script>
</body>
</html>
