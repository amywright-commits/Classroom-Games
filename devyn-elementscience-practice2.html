<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Element Defender</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@500;700;900&family=Nunito:wght@700&display=swap');

        :root {
            --neon-blue: #00f3ff;
            --neon-pink: #ff00ea;
            --neon-green: #39ff14;
            --neon-red: #ff003c;
            --bg-color: #050510;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            user-select: none;
        }

        body {
            background-color: var(--bg-color);
            color: white;
            font-family: 'Nunito', sans-serif;
            overflow: hidden; /* Prevent scrolling */
            height: 100vh;
            width: 100vw;
            display: flex;
            flex-direction: column;
        }

        #game-canvas {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 1;
        }

        /* UI Overlay */
        #ui-layer {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 2;
            pointer-events: none; /* Let clicks pass through to canvas if needed */
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            padding: 20px;
        }

        .top-bar {
            display: flex;
            justify-content: space-between;
            font-family: 'Orbitron', sans-serif;
            font-size: 1.5rem;
            text-shadow: 0 0 10px var(--neon-blue);
        }

        .lives-container {
            color: var(--neon-pink);
            text-shadow: 0 0 10px var(--neon-pink);
        }

        /* Command Input Area */
        .command-center {
            pointer-events: auto; /* Re-enable interaction for input */
            align-self: center;
            margin-bottom: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            width: 100%;
            max-width: 400px;
        }

        .input-label {
            font-family: 'Orbitron', sans-serif;
            color: var(--neon-blue);
            margin-bottom: 10px;
            text-transform: uppercase;
            letter-spacing: 2px;
            font-size: 0.9rem;
        }

        #symbol-input {
            width: 100%;
            background: rgba(0, 20, 40, 0.8);
            border: 2px solid var(--neon-blue);
            border-radius: 10px;
            color: white;
            font-family: 'Nunito', sans-serif;
            font-size: 2.5rem;
            font-weight: 900;
            text-align: center;
            padding: 10px;
            outline: none;
            box-shadow: 0 0 20px rgba(0, 243, 255, 0.3), inset 0 0 10px rgba(0, 243, 255, 0.2);
            transition: all 0.1s;
        }

        #symbol-input:focus {
            box-shadow: 0 0 30px rgba(0, 243, 255, 0.6), inset 0 0 15px rgba(0, 243, 255, 0.4);
        }

        .shake {
            animation: shake 0.4s cubic-bezier(.36,.07,.19,.97) both;
            border-color: var(--neon-red) !important;
            box-shadow: 0 0 20px var(--neon-red) !important;
        }

        @keyframes shake {
            10%, 90% { transform: translate3d(-2px, 0, 0); }
            20%, 80% { transform: translate3d(4px, 0, 0); }
            30%, 50%, 70% { transform: translate3d(-6px, 0, 0); }
            40%, 60% { transform: translate3d(6px, 0, 0); }
        }

        /* Screens (Start/End) */
        .screen {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(5, 5, 16, 0.9);
            backdrop-filter: blur(5px);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 10;
            text-align: center;
            padding: 20px;
            pointer-events: auto;
        }

        .screen h1 {
            font-family: 'Orbitron', sans-serif;
            font-size: 3.5rem;
            color: var(--neon-blue);
            text-shadow: 0 0 20px var(--neon-blue);
            margin-bottom: 20px;
        }

        .screen p {
            font-size: 1.2rem;
            max-width: 500px;
            margin-bottom: 30px;
            line-height: 1.5;
            color: #ddd;
        }

        .btn {
            background: transparent;
            border: 2px solid var(--neon-pink);
            color: white;
            font-family: 'Orbitron', sans-serif;
            font-size: 1.5rem;
            padding: 15px 40px;
            border-radius: 5px;
            cursor: pointer;
            box-shadow: 0 0 15px rgba(255, 0, 234, 0.4) inset, 0 0 20px rgba(255, 0, 234, 0.4);
            transition: all 0.2s;
            text-transform: uppercase;
        }

        .btn:hover {
            background: var(--neon-pink);
            box-shadow: 0 0 30px rgba(255, 0, 234, 0.8);
            transform: scale(1.05);
        }

        #game-over-screen { display: none; }
        
        .correct-answer-display {
            font-size: 2rem;
            color: var(--neon-red);
            margin: 20px 0;
            font-weight: bold;
        }

    </style>
</head>
<body>

    <canvas id="game-canvas"></canvas>

    <div id="ui-layer">
        <div class="top-bar">
            <div>SCORE: <span id="score-display">0</span></div>
            <div class="lives-container">SHIELDS: <span id="lives-display">❤️❤️❤️</span></div>
        </div>

        <div class="command-center">
            <div class="input-label">Type Symbol & Press Enter to Fire</div>
            <input type="text" id="symbol-input" autocomplete="off" spellcheck="false" maxlength="2" disabled>
        </div>
    </div>

    <!-- Start Screen -->
    <div id="start-screen" class="screen">
        <h1>Element Defender</h1>
        <p>Asteroids are falling toward your base! Each asteroid is made of a different element. <br><br>Type the correct <strong>Chemical Symbol</strong> and press <strong>ENTER</strong> to fire your lasers and destroy them.</p>
        <button class="btn" onclick="startGame()">Start Defense</button>
    </div>

    <!-- Game Over Screen -->
    <div id="game-over-screen" class="screen">
        <h1 id="end-title">Game Over</h1>
        <div id="end-reason" class="correct-answer-display"></div>
        <p>Final Score: <span id="final-score" style="color: var(--neon-blue); font-size: 2rem; font-weight: bold;">0</span></p>
        <button class="btn" onclick="startGame()">Play Again</button>
    </div>

    <script>
        // The 25 Elements
        const masterElementList = [
            { name: "Hydrogen", symbol: "H" }, { name: "Helium", symbol: "He" },
            { name: "Lithium", symbol: "Li" }, { name: "Beryllium", symbol: "Be" },
            { name: "Boron", symbol: "B" }, { name: "Carbon", symbol: "C" },
            { name: "Nitrogen", symbol: "N" }, { name: "Oxygen", symbol: "O" },
            { name: "Fluorine", symbol: "F" }, { name: "Neon", symbol: "Ne" },
            { name: "Sodium", symbol: "Na" }, { name: "Magnesium", symbol: "Mg" },
            { name: "Aluminum", symbol: "Al" }, { name: "Silicon", symbol: "Si" },
            { name: "Phosphorus", symbol: "P" }, { name: "Sulfur", symbol: "S" },
            { name: "Chlorine", symbol: "Cl" }, { name: "Argon", symbol: "Ar" },
            { name: "Potassium", symbol: "K" }, { name: "Calcium", symbol: "Ca" },
            { name: "Nickel", symbol: "Ni" }, { name: "Copper", symbol: "Cu" },
            { name: "Silver", symbol: "Ag" }, { name: "Platinum", symbol: "Pt" },
            { name: "Gold", symbol: "Au" }
        ];

        // Canvas Setup
        const canvas = document.getElementById('game-canvas');
        const ctx = canvas.getContext('2d');
        
        // DOM Elements
        const symbolInput = document.getElementById('symbol-input');
        const scoreDisplay = document.getElementById('score-display');
        const livesDisplay = document.getElementById('lives-display');
        const startScreen = document.getElementById('start-screen');
        const gameOverScreen = document.getElementById('game-over-screen');
        const endTitle = document.getElementById('end-title');
        const endReason = document.getElementById('end-reason');
        const finalScore = document.getElementById('final-score');

        // Game State Variables
        let w, h;
        let animationFrameId;
        let isPlaying = false;
        let score = 0;
        let lives = 3;
        let elementsQueue = [];
        
        // Game Entities
        let stars = [];
        let asteroids = [];
        let lasers = [];
        let particles = [];
        
        // Spawn Timers
        let lastSpawnTime = 0;
        let spawnInterval = 3000; // ms between spawns
        let gameTime = 0;

        // Resize Canvas dynamically
        function resize() {
            w = canvas.width = window.innerWidth;
            h = canvas.height = window.innerHeight;
            initStars();
        }
        window.addEventListener('resize', resize);
        resize(); // Initial call

        // --- Entity Constructors ---

        function initStars() {
            stars = [];
            for (let i = 0; i < 100; i++) {
                stars.push({
                    x: Math.random() * w,
                    y: Math.random() * h,
                    size: Math.random() * 2,
                    speed: Math.random() * 0.5 + 0.1
                });
            }
        }

        class Asteroid {
            constructor(elementData) {
                this.name = elementData.name;
                this.symbol = elementData.symbol;
                this.radius = 45;
                // Spawn safely within screen bounds
                this.x = Math.random() * (w - this.radius * 3) + (this.radius * 1.5);
                this.y = -this.radius;
                // Speed increases slowly as score goes up
                this.baseSpeed = 0.8 + (Math.random() * 0.5) + (score * 0.015);
                this.rotation = Math.random() * Math.PI * 2;
                this.rotationSpeed = (Math.random() - 0.5) * 0.02;
                this.color = `hsl(${Math.random() * 360}, 60%, 40%)`;
            }

            update() {
                this.y += this.baseSpeed;
                this.rotation += this.rotationSpeed;
            }

            draw(ctx) {
                ctx.save();
                ctx.translate(this.x, this.y);
                
                // Draw Rock
                ctx.rotate(this.rotation);
                ctx.beginPath();
                ctx.arc(0, 0, this.radius, 0, Math.PI * 2);
                ctx.fillStyle = this.color;
                ctx.fill();
                ctx.strokeStyle = '#fff';
                ctx.lineWidth = 2;
                ctx.stroke();

                // Draw Element Name (Counter-rotate so text is always upright)
                ctx.rotate(-this.rotation);
                ctx.fillStyle = 'white';
                ctx.font = 'bold 16px Nunito';
                ctx.textAlign = 'center';
                ctx.textBaseline = 'middle';
                // Slight shadow for readability
                ctx.shadowColor = 'black';
                ctx.shadowBlur = 4;
                ctx.fillText(this.name, 0, 0);
                
                ctx.restore();
            }
        }

        class Laser {
            constructor(startX, startY, endX, endY) {
                this.startX = startX;
                this.startY = startY;
                this.endX = endX;
                this.endY = endY;
                this.life = 1.0; // 1 second fade out
            }
            update() {
                this.life -= 0.05;
            }
            draw(ctx) {
                ctx.save();
                ctx.beginPath();
                ctx.moveTo(this.startX, this.startY);
                ctx.lineTo(this.endX, this.endY);
                ctx.strokeStyle = `rgba(0, 243, 255, ${this.life})`;
                ctx.lineWidth = 4;
                ctx.shadowColor = '#00f3ff';
                ctx.shadowBlur = 10;
                ctx.stroke();
                ctx.restore();
            }
        }

        class Particle {
            constructor(x, y, color) {
                this.x = x;
                this.y = y;
                const angle = Math.random() * Math.PI * 2;
                const speed = Math.random() * 5 + 2;
                this.vx = Math.cos(angle) * speed;
                this.vy = Math.sin(angle) * speed;
                this.life = 1.0;
                this.color = color || '#00f3ff';
            }
            update() {
                this.x += this.vx;
                this.y += this.vy;
                this.life -= 0.02;
            }
            draw(ctx) {
                ctx.globalAlpha = this.life;
                ctx.fillStyle = this.color;
                ctx.beginPath();
                ctx.arc(this.x, this.y, 3, 0, Math.PI * 2);
                ctx.fill();
                ctx.globalAlpha = 1.0;
            }
        }

        // --- Core Game Logic ---

        function startGame() {
            // Reset variables
            score = 0;
            lives = 3;
            asteroids = [];
            lasers = [];
            particles = [];
            gameTime = 0;
            lastSpawnTime = 0;
            spawnInterval = 3500;
            isPlaying = true;

            // Prepare question queue (shuffle array)
            elementsQueue = shuffleArray([...masterElementList]);

            // Update UI
            updateUI();
            startScreen.style.display = 'none';
            gameOverScreen.style.display = 'none';
            
            symbolInput.disabled = false;
            symbolInput.value = '';
            symbolInput.focus();

            // Start Loop
            cancelAnimationFrame(animationFrameId);
            lastTime = performance.now();
            gameLoop(lastTime);
        }

        function shuffleArray(array) {
            for (let i = array.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [array[i], array[j]] = [array[j], array[i]];
            }
            return array;
        }

        let lastTime = 0;
        function gameLoop(currentTime) {
            if (!isPlaying) return;
            
            const deltaTime = currentTime - lastTime;
            lastTime = currentTime;
            gameTime += deltaTime;

            update(deltaTime);
            draw();

            animationFrameId = requestAnimationFrame(gameLoop);
        }

        function update(deltaTime) {
            // Spawn Asteroids
            if (gameTime - lastSpawnTime > spawnInterval) {
                spawnAsteroid();
                lastSpawnTime = gameTime;
                // Gradually increase spawn rate
                if (spawnInterval > 1500) spawnInterval -= 50; 
            }

            // Update Background Stars
            stars.forEach(star => {
                star.y += star.speed;
                if (star.y > h) {
                    star.y = 0;
                    star.x = Math.random() * w;
                }
            });

            // Update Asteroids
            for (let i = asteroids.length - 1; i >= 0; i--) {
                let a = asteroids[i];
                a.update();

                // Check if hit bottom (Base)
                if (a.y > h - 50) {
                    createExplosion(a.x, a.y, '#ff003c');
                    triggerScreenShake();
                    loseLife(a.name, a.symbol);
                    asteroids.splice(i, 1);
                }
            }

            // Update Lasers
            for (let i = lasers.length - 1; i >= 0; i--) {
                lasers[i].update();
                if (lasers[i].life <= 0) lasers.splice(i, 1);
            }

            // Update Particles
            for (let i = particles.length - 1; i >= 0; i--) {
                particles[i].update();
                if (particles[i].life <= 0) particles.splice(i, 1);
            }
        }

        function draw() {
            // Clear canvas
            ctx.fillStyle = varColor('--bg-color');
            ctx.fillRect(0, 0, w, h);

            // Draw Stars
            ctx.fillStyle = 'rgba(255, 255, 255, 0.5)';
            stars.forEach(star => {
                ctx.beginPath();
                ctx.arc(star.x, star.y, star.size, 0, Math.PI * 2);
                ctx.fill();
            });

            // Draw Entities
            asteroids.forEach(a => a.draw(ctx));
            lasers.forEach(l => l.draw(ctx));
            particles.forEach(p => p.draw(ctx));

            // Draw Base Station (Bottom Center)
            drawBase(ctx);
        }

        function drawBase(ctx) {
            ctx.save();
            ctx.translate(w / 2, h);
            
            // Base Dome
            ctx.beginPath();
            ctx.arc(0, 0, 60, Math.PI, 0);
            ctx.fillStyle = 'rgba(20, 30, 60, 0.8)';
            ctx.fill();
            ctx.strokeStyle = varColor('--neon-blue');
            ctx.lineWidth = 3;
            ctx.stroke();
            
            // Cannon
            ctx.fillStyle = '#aaa';
            ctx.fillRect(-10, -80, 20, 40);
            
            ctx.restore();
        }

        // --- Interaction Mechanics ---

        function spawnAsteroid() {
            // If queue empty, restock
            if (elementsQueue.length === 0) {
                elementsQueue = shuffleArray([...masterElementList]);
            }
            
            const el = elementsQueue.pop();
            asteroids.push(new Asteroid(el));
        }

        // Handle Input
        symbolInput.addEventListener('keydown', function(e) {
            if (e.key === 'Enter') {
                const guess = this.value.trim().toLowerCase();
                if (guess === '') return;
                
                checkDefense(guess);
            }
        });

        function checkDefense(guess) {
            // Find if any falling asteroid matches the symbol typed
            const targetIndex = asteroids.findIndex(a => a.symbol.toLowerCase() === guess);

            if (targetIndex !== -1) {
                // CORRECT! BOOM!
                const target = asteroids[targetIndex];
                
                // Shoot laser from base (w/2, h - 60) to asteroid
                lasers.push(new Laser(w/2, h - 80, target.x, target.y));
                createExplosion(target.x, target.y, '#00f3ff');
                
                // Remove asteroid & update score
                asteroids.splice(targetIndex, 1);
                score += 10;
                
                // Keep input ready, clear it
                symbolInput.value = '';
                updateUI();
                
                // Bonus condition - check if queue is complete
                if(score > 0 && score % 250 === 0) {
                     spawnInterval += 1000; // Give a slight breather on wave complete
                }

            } else {
                // WRONG!
                symbolInput.classList.remove('shake');
                void symbolInput.offsetWidth; // Trigger reflow to restart animation
                symbolInput.classList.add('shake');
                symbolInput.value = '';
            }
        }

        function createExplosion(x, y, color) {
            for (let i = 0; i < 20; i++) {
                particles.push(new Particle(x, y, color));
            }
        }

        function triggerScreenShake() {
            document.body.style.transform = `translate(${Math.random()*10 - 5}px, ${Math.random()*10 - 5}px)`;
            setTimeout(() => { document.body.style.transform = 'none'; }, 50);
        }

        function loseLife(name, symbol) {
            lives--;
            updateUI();
            
            if (lives <= 0) {
                endGame(name, symbol);
            } else {
                // Flash background red temporarily
                canvas.style.backgroundColor = 'rgba(255,0,0,0.2)';
                setTimeout(() => canvas.style.backgroundColor = 'transparent', 150);
            }
        }

        function updateUI() {
            scoreDisplay.textContent = score;
            let hearts = '';
            for(let i=0; i<lives; i++) hearts += '❤️';
            livesDisplay.textContent = hearts || '💀';
        }

        function endGame(fatalName, fatalSymbol) {
            isPlaying = false;
            symbolInput.disabled = true;
            symbolInput.blur();
            
            // Set End Screen details
            if(score >= 250) {
                endTitle.textContent = "Great Defense!";
                endTitle.style.color = "var(--neon-green)";
            } else {
                endTitle.textContent = "Base Destroyed";
                endTitle.style.color = "var(--neon-red)";
            }
            
            // Show them what they missed as a learning moment
            endReason.innerHTML = `The asteroid that hit you was <strong>${fatalName}</strong>.<br>Its symbol is <strong>${fatalSymbol}</strong>`;
            finalScore.textContent = score;
            
            gameOverScreen.style.display = 'flex';
        }

        // Helper to grab CSS vars for Canvas
        function varColor(name) {
            return getComputedStyle(document.documentElement).getPropertyValue(name).trim() || '#fff';
        }

        // Keep input focused if they click away (but not on end screens)
        document.addEventListener('click', (e) => {
            if (isPlaying && e.target !== symbolInput) {
                symbolInput.focus();
            }
        });

    </script>
</body>
</html>
