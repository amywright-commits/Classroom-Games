<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Jackson and Sam's Apostrophe Practice</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&family=Space+Mono:wght@400;700&display=swap');

        body {
            background-color: #F8FAFC;
            color: #334155;
            font-family: 'Outfit', sans-serif;
        }

        .neon-blue-text {
            color: #0284C7;
            font-weight: 800;
        }

        .neon-green-text {
            color: #16A34A;
            font-weight: 800;
        }

        .neon-border {
            border: 1px solid #BAE6FD;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1), 0 2px 4px -1px rgba(0, 0, 0, 0.06);
        }

        .input-box {
            background: #FFFFFF;
            border: 2px solid #CBD5E1;
            color: #0F172A;
            font-family: 'Space Mono', monospace;
            padding: 0.25rem 0.75rem;
            border-radius: 0.375rem;
            outline: none;
            transition: all 0.3s ease;
            width: 140px;
            text-align: center;
        }

        .input-box:focus {
            border-color: #0284C7;
            box-shadow: 0 0 0 3px rgba(2, 132, 199, 0.2);
        }

        .input-correct {
            border-color: #16A34A !important;
            box-shadow: 0 0 0 3px rgba(22, 163, 74, 0.2) !important;
            color: #16A34A;
        }

        .input-incorrect {
            border-color: #DC2626 !important;
            box-shadow: 0 0 0 3px rgba(220, 38, 38, 0.2) !important;
            color: #DC2626;
        }

        .btn-check {
            background: linear-gradient(135deg, #0284C7, #0ea5e9);
            box-shadow: 0 4px 15px rgba(2, 132, 199, 0.3);
            transition: transform 0.2s, box-shadow 0.2s;
        }

        .btn-check:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(2, 132, 199, 0.4);
        }
        
        .btn-check:disabled {
            background: #94A3B8;
            box-shadow: none;
            cursor: not-allowed;
            transform: none;
        }

        .sticky-header {
            background: rgba(248, 250, 252, 0.9);
            backdrop-filter: blur(10px);
            border-bottom: 1px solid #E2E8F0;
        }
    </style>
</head>
<body class="min-h-screen pb-20">

    <!-- Sticky Score Header -->
    <header class="sticky-header fixed top-0 w-full z-50 p-4 shadow-sm">
        <div class="max-w-5xl mx-auto flex flex-col md:flex-row justify-between items-center gap-4">
            <h1 class="text-2xl md:text-3xl font-extrabold text-slate-800 tracking-wider">
                <span class="neon-blue-text">JACKSON</span> & <span class="neon-green-text">SAM'S</span> <br class="md:hidden"/> APOSTROPHE PRACTICE
            </h1>
            <div class="flex gap-6 items-center bg-white px-6 py-2 rounded-full border border-slate-200 shadow-sm">
                <div class="text-lg font-bold">
                    SCORE: <span id="total-score" class="text-3xl neon-green-text ml-2">0</span> <span class="text-sm text-slate-500">/ 150</span>
                </div>
            </div>
        </div>
    </header>

    <!-- Main Content -->
    <main class="max-w-4xl mx-auto pt-32 px-4" id="app-container">
        <!-- Sections will be injected here by JavaScript -->
    </main>

    <script>
        // Game State
        let totalScore = 0;

        // Data Structure for Rules and Questions
        // Bracketed words [word] will be turned into input boxes. The user must type the correct answer.
        const rulesData = [
            {
                ruleNumber: 1,
                title: "Contractions",
                description: "Use the apostrophe with contractions to replace missing letters.",
                examples: ["She isn't here.", "You're my best friend."],
                questions: [
                    { text: "Dexter [shouldnt] be wearing his jacket in school.", answer: "shouldn't" },
                    { text: "We [arent] going to the movies tonight.", answer: "aren't" },
                    { text: "I [cant] wait for the weekend.", answer: "can't" },
                    { text: "We [wont] be able to make it to the party.", answer: "won't" },
                    { text: "[Its] a beautiful day outside.", answer: "It's" },
                    { text: "They [dont] know the answer to the math problem.", answer: "don't" },
                    { text: "He [hasnt] finished his homework yet.", answer: "hasn't" },
                    { text: "[Youre] going to be late if you don't hurry.", answer: "You're" },
                    { text: "I [wouldnt] do that if I were you.", answer: "wouldn't" },
                    { text: "[Theyre] playing basketball in the driveway.", answer: "They're" },
                    { text: "We [couldnt] find the remote control anywhere.", answer: "couldn't" },
                    { text: "She [doesnt] like eating broccoli.", answer: "doesn't" },
                    { text: "I [havent] seen that movie yet.", answer: "haven't" },
                    { text: "[Whos] knocking at the front door?", answer: "Who's" },
                    { text: "[Theres] a spider on the ceiling!", answer: "There's" }
                ]
            },
            {
                ruleNumber: 2,
                title: "Singular Possession",
                description: "Use the apostrophe to show possession for a singular noun. (Usually add 's, even if it ends in s or x).",
                examples: ["The dog's collar is red.", "Charles's car is new."],
                questions: [
                    { text: "[Alexes] speech was so good, and he spoke clearly.", answer: "Alex's" },
                    { text: "It was sad when [Londons] basketball season ended.", answer: "London's" },
                    { text: "[Mr. Kes] science class in fifth grade was my favorite.", answer: "Mr. Kes's", alternate: "Mr. Kes'" },
                    { text: "The [bosses] office is at the end of the hall.", answer: "boss's" },
                    { text: "We found the [cats] toy under the couch.", answer: "cat's" },
                    { text: "That is my [friends] favorite video game.", answer: "friend's" },
                    { text: "[Jacksons] backpack is heavy.", answer: "Jackson's" },
                    { text: "[Sams] shoes are tied tightly.", answer: "Sam's" },
                    { text: "The [teachers] desk is organized.", answer: "teacher's" },
                    { text: "[Texas] weather is very unpredictable.", answer: "Texas's", alternate: "Texas'" },
                    { text: "The [dogs] bone was buried in the yard.", answer: "dog's" },
                    { text: "[Chris] jacket was left on the bus.", answer: "Chris's", alternate: "Chris'" },
                    { text: "We rode in my [moms] new car.", answer: "mom's" },
                    { text: "The [sun] rays were very warm today.", answer: "sun's" },
                    { text: "I borrowed [Jessicas] favorite book.", answer: "Jessica's" }
                ]
            },
            {
                ruleNumber: 3,
                title: "Implied Nouns",
                description: "Use the apostrophe where the noun that should follow is implied (left out but understood).",
                examples: ["We went to my uncle's [house].", "This coat is John's [coat]."],
                questions: [
                    { text: "I’m pretty sure that the laptop on the table is [Helens].", answer: "Helen's" },
                    { text: "Everyone thought the charger was [Liams], but it was actually Annie's.", answer: "Liam's" },
                    { text: "Everyone thought the charger was Liam's, but it was actually [Annies].", answer: "Annie's" },
                    { text: "We are meeting at [Toms] later tonight.", answer: "Tom's" },
                    { text: "That idea must have been [Sarahs].", answer: "Sarah's" },
                    { text: "The jacket on the chair is [Mikes].", answer: "Mike's" },
                    { text: "I left my notebook at [Emmas].", answer: "Emma's" },
                    { text: "The red bike is [Ryans].", answer: "Ryan's" },
                    { text: "Is that drawing [Julias]?", answer: "Julia's" },
                    { text: "No, the drawing is [Davids].", answer: "David's" },
                    { text: "Are we going to [Grandmas] for Thanksgiving?", answer: "Grandma's" },
                    { text: "I forgot my pen, so I used [Jordans].", answer: "Jordan's" },
                    { text: "That sandwich looks a lot like [Peters].", answer: "Peter's" },
                    { text: "The blue jacket in the closet is [Kevins].", answer: "Kevin's" },
                    { text: "The doctor's appointment took longer than the [dentists].", answer: "dentist's" }
                ]
            },
            {
                ruleNumber: 4,
                title: "Plural Possession",
                description: "Make the noun plural first. If it ends in s, just add '. If it does not end in s, add 's.",
                examples: ["The girls' locker room.", "The children's toys."],
                questions: [
                    { text: "The [birds] nest was constructed out of straw and mud. (plural)", answer: "birds'" },
                    { text: "The [buses] wheels are all made for winter driving. (plural)", answer: "buses'" },
                    { text: "The [geeses] migratory path flew over Minnesota. (plural)", answer: "geese's" },
                    { text: "The [mens] room is just down the hall to the left. (plural)", answer: "men's" },
                    { text: "The [Raos] house is down the street from mine. (The Rao family)", answer: "Raos'" },
                    { text: "That dog is the [McGarrys]. (The McGarry family)", answer: "McGarrys'" },
                    { text: "The [Roberts] car is white with black interior. (The Roberts family)", answer: "Robertses'", alternate: "Roberts'" },
                    { text: "The [womens] league starts playing next week.", answer: "women's" },
                    { text: "All the [students] grades were posted online.", answer: "students'" },
                    { text: "The [mices] cheese was taken from the trap.", answer: "mice's" },
                    { text: "The [childrens] choir sang beautifully.", answer: "children's" },
                    { text: "The [dogs] leashes were all tangled together. (plural dogs)", answer: "dogs'" },
                    { text: "The [peoples] votes were finally counted.", answer: "people's" },
                    { text: "Both [teams] scores were tied at halftime.", answer: "teams'" },
                    { text: "The [bosses] parking spots are closest to the door. (plural bosses)", answer: "bosses'" }
                ]
            },
            {
                ruleNumber: 5,
                title: "Plural Names (No Apostrophe)",
                description: "Do not use an apostrophe to simply make a name plural. Just add s or es.",
                examples: ["The Smiths are coming over.", "We visited the Joneses."],
                questions: [
                    { text: "We love hanging out with the [Casad's].", answer: "Casads" },
                    { text: "The [Barnes's] always have a haunted house on Halloween.", answer: "Barneses" },
                    { text: "I sent a holiday card to the [Miller's].", answer: "Millers" },
                    { text: "The [Johnson's] bought a new boat.", answer: "Johnsons" },
                    { text: "Are the [Williams's] going on vacation?", answer: "Williamses" },
                    { text: "The [Brown's] dog is barking again.", answer: "Browns" },
                    { text: "We invited the [Davis's] to dinner.", answer: "Davises" },
                    { text: "The [Wilson's] moved to a new state.", answer: "Wilsons" },
                    { text: "The [Clark's] are hosting the barbecue.", answer: "Clarks" },
                    { text: "I saw the [Gomez's] at the grocery store.", answer: "Gomezes" },
                    { text: "The [Smith's] are hosting a block party.", answer: "Smiths" },
                    { text: "We went camping with the [Garcia's].", answer: "Garcias" },
                    { text: "The [Jones's] have a beautiful garden.", answer: "Joneses" },
                    { text: "I waved to the [Harrison's] as they drove by.", answer: "Harrisons" },
                    { text: "The [Rodriguez's] adopted a new puppy.", answer: "Rodriguezes" }
                ]
            },
            {
                ruleNumber: 6,
                title: "Singular Compound Nouns",
                description: "With a singular compound noun, show possession with 's at the end of the word.",
                examples: ["My mother-in-law's recipe.", "The runner-up's trophy."],
                questions: [
                    { text: "My [sister-in-laws] apple pie is the best I’ve ever had. (singular)", answer: "sister-in-law's" },
                    { text: "The [commander-in-chiefs] speech was broadcast globally.", answer: "commander-in-chief's" },
                    { text: "My [brother-in-laws] car is in the shop.", answer: "brother-in-law's" },
                    { text: "The [editor-in-chiefs] notes were on the desk.", answer: "editor-in-chief's" },
                    { text: "My [father-in-laws] watch is an antique.", answer: "father-in-law's" },
                    { text: "The [passer-bys] quick action saved the day.", answer: "passer-by's" },
                    { text: "My [mother-in-laws] garden is beautiful.", answer: "mother-in-law's" },
                    { text: "The [son-in-laws] promotion was celebrated.", answer: "son-in-law's" },
                    { text: "The [daughter-in-laws] gift was very thoughtful.", answer: "daughter-in-law's" },
                    { text: "The [runner-ups] prize was a silver medal.", answer: "runner-up's" },
                    { text: "The [vice-presidents] speech was very inspiring. (singular)", answer: "vice-president's" },
                    { text: "My [great-grandmothers] quilt is a family heirloom.", answer: "great-grandmother's" },
                    { text: "The [sergeant-at-arms] duty is to keep order.", answer: "sergeant-at-arms's", alternate: "sergeant-at-arms'" },
                    { text: "The [merry-go-rounds] music was very loud.", answer: "merry-go-round's" },
                    { text: "My [seven-year-olds] birthday party is tomorrow. (singular)", answer: "seven-year-old's" }
                ]
            },
            {
                ruleNumber: 7,
                title: "Plural Compound Nouns",
                description: "If the compound noun is plural, form the plural first and then use the apostrophe.",
                examples: ["My two brothers-in-law's businesses.", "The runners-up's medals."],
                questions: [
                    { text: "My four [sister-in-laws] kids are all so nice. (plural)", answer: "sisters-in-law's" },
                    { text: "Both [brother-in-laws] flights were delayed.", answer: "brothers-in-law's" },
                    { text: "The [commander-in-chiefs] meetings were scheduled back-to-back. (plural)", answer: "commanders-in-chief's" },
                    { text: "All three [mother-in-laws] recipes were shared at the party.", answer: "mothers-in-law's" },
                    { text: "The [editor-in-chiefs] offices are on the top floor. (plural)", answer: "editors-in-chief's" },
                    { text: "The two [passer-bys] statements matched the security footage.", answer: "passers-by's" },
                    { text: "Both [father-in-laws] retirement parties are this month.", answer: "fathers-in-law's" },
                    { text: "The [son-in-laws] businesses are thriving. (plural)", answer: "sons-in-law's" },
                    { text: "All the [daughter-in-laws] dresses were blue. (plural)", answer: "daughters-in-law's" },
                    { text: "The [runner-ups] times were recorded by the officials. (plural)", answer: "runners-up's" },
                    { text: "The two [vice-presidents] schedules were completely packed.", answer: "vice-presidents'" },
                    { text: "All my [great-grandparents] portraits hang in the hall.", answer: "great-grandparents'" },
                    { text: "The [merry-go-rounds] motors all broke down at once. (plural)", answer: "merry-go-rounds'" },
                    { text: "The three [seven-year-olds] projects were displayed.", answer: "seven-year-olds'" },
                    { text: "The [attorneys-at-laws] offices were located downtown. (plural)", answer: "attorneys-at-law's" }
                ]
            },
            {
                ruleNumber: 8,
                title: "Joint vs. Separate Possession",
                description: "Use 's after the second name only if two people possess the SAME item. Use 's on BOTH if they own separate items.",
                examples: ["Bob and Mary's house. (One house)", "Bob's and Mary's cars. (Separate cars)"],
                questions: [
                    { text: "[Annies mom and dads] wedding was at a ski resort. (Joint ownership)", answer: "Annie's mom and dad's" },
                    { text: "My [moms and dads] houses are in different cities. (Separate homes)", answer: "mom's and dad's" },
                    { text: "[Jackson and Sams] project won first place. (They worked together)", answer: "Jackson and Sam's" },
                    { text: "[Jacksons and Sams] lockers are on opposite ends of the hall. (Separate lockers)", answer: "Jackson's and Sam's" },
                    { text: "[Batman and Robins] Batmobile broke down. (They share it)", answer: "Batman and Robin's" },
                    { text: "[Batmans and Supermans] capes are different colors. (Separate capes)", answer: "Batman's and Superman's" },
                    { text: "[Lewis and Clarks] expedition was historic. (Joint expedition)", answer: "Lewis and Clark's" },
                    { text: "[Alices and Bobs] test scores were the highest. (Separate scores)", answer: "Alice's and Bob's" },
                    { text: "The [cat and dogs] water bowl is empty. (Shared bowl)", answer: "cat and dog's" },
                    { text: "The [cats and dogs] sleeping habits are very different. (Separate habits)", answer: "cat's and dog's" },
                    { text: "[Ben and Jerrys] ice cream is famous worldwide. (Joint ownership)", answer: "Ben and Jerry's" },
                    { text: "[Bens and Jerrys] respective businesses are both successful. (Separate businesses)", answer: "Ben's and Jerry's" },
                    { text: "[Megan and Harrys] interview was broadcast live. (Joint interview)", answer: "Megan and Harry's" },
                    { text: "[Megans and Harrys] coats were hung by the door. (Separate coats)", answer: "Megan's and Harry's" },
                    { text: "[Peanut butter and jellys] combination is a classic. (Joint concept)", answer: "Peanut butter and jelly's" }
                ]
            },
            {
                ruleNumber: 9,
                title: "Possessive Pronouns (No Apostrophe)",
                description: "Never use an apostrophe with possessive pronouns: his, hers, its, theirs, ours, yours, whose.",
                examples: ["The book is hers.", "The dog wagged its tail."],
                questions: [
                    { text: "[Who's] sweatshirt is this?", answer: "Whose" },
                    { text: "Roman’s dog, Elvis, chased [it's] own tail.", answer: "its" },
                    { text: "That basketball is not mine, it is [her's].", answer: "hers" },
                    { text: "They claimed the victory was [their's].", answer: "theirs" },
                    { text: "This classroom is [our's] for the next hour.", answer: "ours" },
                    { text: "Is this lunchbox [your's]?", answer: "yours" },
                    { text: "The tree lost all [it's] leaves in autumn.", answer: "its" },
                    { text: "I don't know [who's] turn it is to take out the trash.", answer: "whose" },
                    { text: "The blue team won [their's] easily.", answer: "theirs" },
                    { text: "Our project is finished, how is [your's] coming along?", answer: "yours" },
                    { text: "The cat licked [it's] paws after dinner.", answer: "its" },
                    { text: "Is that coat [his']?", answer: "his" },
                    { text: "We brought our snacks, did they bring [their's]?", answer: "theirs" },
                    { text: "The decision is entirely [your's] to make.", answer: "yours" },
                    { text: "[Who's] shoes are left by the back door?", answer: "Whose" }
                ]
            },
            {
                ruleNumber: 10,
                title: "Capital Letters & Numbers",
                description: "Modern grammar rules state plurals for capital letters and numbers used as nouns are NOT formed with apostrophes.",
                examples: ["She grew up in the 1990s.", "He knows his ABCs."],
                questions: [
                    { text: "Mr. Law was born in the [70's].", answer: "70s" },
                    { text: "In kindergarten, you learn all your [ABC's].", answer: "ABCs" },
                    { text: "Anushka had all [D's] and Fs on her report card.", answer: "Ds" },
                    { text: "Anushka had all Ds and [F's] on her report card.", answer: "Fs" },
                    { text: "My parents love music from the [80's].", answer: "80s" },
                    { text: "The VIP list included all the [CEO's].", answer: "CEOs" },
                    { text: "I bought three new [DVD's] yesterday.", answer: "DVDs" },
                    { text: "She got straight [A's] this semester.", answer: "As" },
                    { text: "There were several [UFO's] spotted in the sky.", answer: "UFOs" },
                    { text: "The temperature will be in the low [90's] today.", answer: "90s" },
                    { text: "He was throwing [100's] at the dartboard.", answer: "100s" },
                    { text: "Ensure you cross your [T's] and dot your Is.", answer: "Ts" },
                    { text: "Ensure you cross your Ts and dot your [I's].", answer: "Is" },
                    { text: "The company hired three new [CFO's].", answer: "CFOs" },
                    { text: "She collects antique [TV's] from the 1950s.", answer: "TVs" }
                ]
            }
        ];

        // Initialize Application
        function initApp() {
            const container = document.getElementById('app-container');
            
            // 10 Unique Vibrant "Neon Box" Themes
            const themes = [
                { from: 'from-pink-500', to: 'to-rose-500' },
                { from: 'from-violet-500', to: 'to-purple-600' },
                { from: 'from-blue-500', to: 'to-cyan-500' },
                { from: 'from-emerald-500', to: 'to-teal-500' },
                { from: 'from-amber-500', to: 'to-orange-500' },
                { from: 'from-red-500', to: 'to-rose-600' },
                { from: 'from-indigo-500', to: 'to-blue-600' },
                { from: 'from-fuchsia-500', to: 'to-pink-600' },
                { from: 'from-cyan-500', to: 'to-teal-400' },
                { from: 'from-purple-600', to: 'to-violet-500' }
            ];
            
            rulesData.forEach((rule, ruleIdx) => {
                const theme = themes[ruleIdx % themes.length];

                // Create Section Container (removed padding so banner hits the edges)
                const section = document.createElement('section');
                section.className = 'bg-white rounded-2xl mb-12 border border-slate-200 relative overflow-hidden shadow-lg';
                
                // 1. Create the Big Colored "Neon" Banner
                const banner = document.createElement('div');
                banner.className = `bg-gradient-to-r ${theme.from} ${theme.to} p-6 md:p-8 relative overflow-hidden shadow-md`;
                banner.innerHTML = `
                    <!-- Background glow effect inside the banner -->
                    <div class="absolute -top-24 -right-24 w-64 h-64 bg-white/20 rounded-full blur-3xl"></div>
                    <div class="relative z-10">
                        <div class="inline-block bg-white/20 backdrop-blur-md text-white font-black px-4 py-1.5 rounded-md text-sm mb-3 tracking-widest uppercase border border-white/40 shadow-sm">
                            Rule ${rule.ruleNumber}
                        </div>
                        <h2 class="text-3xl md:text-4xl font-extrabold text-white mb-3 drop-shadow-lg tracking-tight" style="text-shadow: 0 0 15px rgba(255,255,255,0.5), 0 0 30px rgba(255,255,255,0.3);">${rule.title}</h2>
                        <p class="text-white/95 text-lg font-medium drop-shadow-sm max-w-3xl">${rule.description}</p>
                    </div>
                `;
                section.appendChild(banner);

                // 2. Create the Body Wrapper for Content
                const bodyDiv = document.createElement('div');
                bodyDiv.className = 'p-6 md:p-8';

                // 3. Examples Box
                bodyDiv.innerHTML = `
                    <div class="bg-slate-50 border border-slate-200 rounded-xl p-5 mb-8 shadow-inner">
                        <span class="text-xs text-slate-500 uppercase tracking-widest font-bold mb-3 block">Examples:</span>
                        <ul class="list-disc list-inside text-slate-700 font-medium space-y-1.5">
                            ${rule.examples.map(ex => `<li>${ex}</li>`).join('')}
                        </ul>
                    </div>
                `;

                // Questions Container
                const questionsDiv = document.createElement('div');
                questionsDiv.className = 'space-y-4 mb-8 relative z-10';

                rule.questions.forEach((q, qIdx) => {
                    const qId = `q_${ruleIdx}_${qIdx}`;
                    // Split text to capture the incorrect word inside the brackets
                    const parts = q.text.split(/\[(.*?)\]/);
                    const beforeText = parts[0];
                    const hintText = parts[1];
                    const afterText = parts[2];
                    
                    const qRow = document.createElement('div');
                    qRow.className = 'flex flex-wrap items-center gap-2 text-lg bg-slate-50 p-3 rounded-lg border border-slate-200 hover:bg-slate-100 transition-colors';
                    
                    let rowContent = `<span class="text-slate-500 font-mono text-sm w-6 text-right mr-2">${qIdx + 1}.</span>`;
                    rowContent += `<span class="text-slate-700">${beforeText}</span>`;
                    
                    if (hintText) {
                        // Display the incorrect word crossed out so they know what to fix
                        rowContent += `<span class="bg-red-50 text-red-500 font-mono px-2 py-0.5 rounded text-sm line-through border border-red-100">${hintText}</span>`;
                        rowContent += `<input type="text" id="${qId}" class="input-box" placeholder="fix it" autocomplete="off" spellcheck="false" data-answer="${q.answer}" ${q.alternate ? `data-alternate="${q.alternate}"` : ''}>`;
                    }
                    
                    rowContent += `<span class="text-slate-700">${afterText || ''}</span>`;
                    rowContent += `<span id="feedback_${qId}" class="ml-auto font-bold text-sm hidden"></span>`;
                    
                    qRow.innerHTML = rowContent;
                    questionsDiv.appendChild(qRow);
                });

                bodyDiv.appendChild(questionsDiv);

                // Check Button
                const btnContainer = document.createElement('div');
                btnContainer.className = 'flex justify-end relative z-10';
                const checkBtn = document.createElement('button');
                checkBtn.className = 'btn-check text-white font-bold py-3 px-8 rounded-xl tracking-wider uppercase';
                checkBtn.innerText = 'Check Answers';
                checkBtn.onclick = () => checkSection(ruleIdx, checkBtn);
                
                btnContainer.appendChild(checkBtn);
                
                bodyDiv.appendChild(btnContainer);
                section.appendChild(bodyDiv);
                
                container.appendChild(section);
            });
        }

        function checkSection(ruleIdx, btnElement) {
            const rule = rulesData[ruleIdx];
            let sectionScore = 0;
            
            rule.questions.forEach((q, qIdx) => {
                const qId = `q_${ruleIdx}_${qIdx}`;
                const input = document.getElementById(qId);
                const feedback = document.getElementById(`feedback_${qId}`);
                
                const userAnswer = input.value.trim().toLowerCase();
                const correctAnswer = q.answer.toLowerCase();
                const alternateAnswer = q.alternate ? q.alternate.toLowerCase() : null;

                // Reset classes
                input.classList.remove('input-correct', 'input-incorrect');
                feedback.classList.remove('hidden', 'neon-green-text', 'neon-blue-text', 'text-red-400', 'text-red-600');
                
                if (userAnswer === correctAnswer || userAnswer === alternateAnswer) {
                    input.classList.add('input-correct');
                    feedback.innerText = "✓ CORRECT";
                    feedback.classList.add('neon-green-text');
                    input.disabled = true; // Lock input if correct
                    if (!input.dataset.scored) {
                        totalScore += 1;
                        input.dataset.scored = "true";
                    }
                } else {
                    input.classList.add('input-incorrect');
                    if (userAnswer === "") {
                        feedback.innerText = "Missing";
                        feedback.classList.add('text-red-600');
                    } else {
                        feedback.innerText = `✗ Correct: ${q.answer}`;
                        feedback.classList.add('text-red-600');
                    }
                }
            });

            // Update Total Score Display
            document.getElementById('total-score').innerText = totalScore;
            
            // Add a little pop animation to the score
            const scoreEl = document.getElementById('total-score');
            scoreEl.style.transform = 'scale(1.3)';
            setTimeout(() => {
                scoreEl.style.transform = 'scale(1)';
            }, 200);

            // Change button state if all correct
            const allInputs = document.querySelectorAll(`[id^="q_${ruleIdx}_"]`);
            const allCorrect = Array.from(allInputs).every(inp => inp.classList.contains('input-correct'));
            
            if (allCorrect) {
                btnElement.innerText = "Section Passed!";
                btnElement.disabled = true;
                btnElement.classList.replace('btn-check', 'bg-green-600');
            } else {
                btnElement.innerText = "Try Again";
            }
        }

        // Run setup on load
        window.onload = initApp;
    </script>
</body>
</html>
